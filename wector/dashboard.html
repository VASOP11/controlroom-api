<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wector — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0A0A0F;
  --bg-surface: #111118;
  --bg-surface-hover: #16161F;
  --bg-elevated: #1A1A24;
  --border: #1E1E2E;
  --border-subtle: #15151F;
  --text-primary: #F1F5F9;
  --text-secondary: #A0AEC0;
  --text-muted: #4A5568;
  --accent-blue: #4F6EF7;
  --accent-blue-hover: #6380FF;
  --tier-hot: #22C55E;
  --tier-warm: #F59E0B;
  --tier-cool: #6B7280;
  --tier-dead: #EF4444;
  --font-sans: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'Menlo', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { background: var(--bg-primary); color: var(--text-primary); font-family: var(--font-sans); font-size: 14px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
button { cursor: pointer; border: none; background: none; font-family: inherit; font-size: inherit; color: inherit; }
input, textarea, select { font-family: inherit; font-size: inherit; }
a { color: inherit; text-decoration: none; }

/* ── TOP BAR ── */
#topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg-primary);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
}
.topbar-row1 {
  display: flex; align-items: center; gap: 16px; height: 60px;
}
.topbar-brand {
  font-family: var(--font-mono); font-size: 15px; font-weight: 500;
  letter-spacing: 0.14em; color: var(--accent-blue); text-transform: uppercase;
  flex-shrink: 0; user-select: none;
}
.topbar-input-wrap {
  flex: 1; max-width: 580px; display: flex; align-items: center; gap: 8px;
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 0 8px 0 12px;
  transition: border-color 150ms;
}
.topbar-input-wrap:focus-within { border-color: var(--accent-blue); }
.topbar-input-wrap svg { color: var(--text-muted); flex-shrink: 0; }
#url-input {
  flex: 1; height: 40px; background: transparent; border: none; outline: none;
  color: var(--text-primary); font-size: 14px;
}
#url-input::placeholder { color: var(--text-muted); }
#url-input:disabled { opacity: 0.5; }
#scrape-btn {
  height: 32px; padding: 0 14px; background: var(--accent-blue); color: #fff;
  border-radius: 5px; font-size: 13px; font-weight: 600;
  display: inline-flex; align-items: center; gap: 6px;
  transition: background 150ms; flex-shrink: 0;
}
#scrape-btn:hover:not(:disabled) { background: var(--accent-blue-hover); }
#scrape-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.topbar-user { font-size: 12px; color: var(--text-muted); flex-shrink: 0; margin-left: auto; }
.topbar-row2 {
  padding: 0 0 10px 0;
  display: flex; align-items: center; gap: 12px;
}
#csv-btn {
  font-size: 12px; color: var(--text-muted);
  display: inline-flex; align-items: center; gap: 4px;
  transition: color 150ms;
}
#csv-btn:hover { color: var(--text-secondary); }
#scrape-status {
  font-size: 12px; color: var(--text-muted); font-family: var(--font-mono);
}

/* ── FILTER BAR ── */
#filter-bar {
  padding: 10px 24px;
  display: flex; align-items: center; gap: 4px;
  border-bottom: 1px solid var(--border-subtle);
  overflow-x: auto;
  -ms-overflow-style: none; scrollbar-width: none;
}
#filter-bar::-webkit-scrollbar { display: none; }
.filter-btn {
  height: 28px; padding: 0 10px; border-radius: 5px;
  font-size: 12px; font-weight: 500; color: var(--text-muted);
  border: 1px solid transparent; white-space: nowrap;
  display: inline-flex; align-items: center; gap: 5px;
  transition: all 120ms;
}
.filter-btn:hover { background: var(--bg-surface-hover); color: var(--text-secondary); }
.filter-btn.active {
  background: var(--bg-surface); border-color: var(--border);
  color: var(--text-primary);
}
.filter-count {
  font-family: var(--font-mono); font-size: 10px;
  background: var(--bg-elevated); color: var(--text-muted);
  padding: 0 5px; border-radius: 3px; min-width: 16px; text-align: center;
}

/* ── MAIN ── */
#main { padding: 0 24px 80px; }

/* ── TABLE ── */
.leads-table { width: 100%; border-collapse: collapse; margin-top: 4px; }
.leads-table thead th {
  text-align: left; padding: 8px 12px;
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  white-space: nowrap; user-select: none;
}
.leads-table thead th.sortable { cursor: pointer; }
.leads-table thead th.sortable:hover { color: var(--text-secondary); }
.leads-table tbody tr {
  border-bottom: 1px solid var(--border-subtle);
  cursor: pointer; transition: background 100ms;
}
.leads-table tbody tr:hover { background: var(--bg-surface-hover); }
.leads-table tbody td { padding: 10px 12px; vertical-align: middle; }

.col-tier { width: 72px; }
.col-firma { min-width: 140px; }
.col-kontakt { width: 155px; }
.col-telefon { width: 135px; }
.col-score { width: 64px; }
.col-status { width: 108px; }

.tier-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: var(--font-mono); font-size: 11px; font-weight: 500;
}
.tier-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.t-HOT { color: var(--tier-hot); }
.t-HOT .tier-dot { background: var(--tier-hot); }
.t-WARM { color: var(--tier-warm); }
.t-WARM .tier-dot { background: var(--tier-warm); }
.t-COOL { color: var(--tier-cool); }
.t-COOL .tier-dot { background: var(--tier-cool); }
.t-DEAD { color: var(--tier-dead); }
.t-DEAD .tier-dot { background: var(--tier-dead); }
.t-MANUAL_REVIEW { color: var(--tier-warm); }
.t-MANUAL_REVIEW .tier-dot { background: var(--tier-warm); }
.manual-review-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 500; color: var(--tier-warm);
  background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.25);
  border-radius: 4px; padding: 1px 7px; white-space: nowrap;
}

/* ── STRUCTURED REASONING ── */
.rs-section { padding: 8px 0; border-bottom: 1px solid var(--border-subtle); }
.rs-section:last-child { border-bottom: none; }
.rs-title {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 3px;
}
.rs-body { font-size: 12px; color: var(--text-secondary); line-height: 1.55; word-break: break-word; }
.rs-phone-item { display: flex; gap: 8px; padding: 2px 0; font-size: 12px; }
.rs-phone-item .mono { font-family: var(--font-mono); color: var(--text-primary); flex-shrink: 0; }
.rs-phone-item .rs-ctx { color: var(--text-muted); }

.firma-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
.firma-url { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); margin-top: 1px; }

.score-val { font-family: var(--font-mono); font-weight: 500; font-size: 14px; }

.phone-link { font-family: var(--font-mono); font-size: 12px; color: var(--text-secondary); transition: color 120ms; }
.phone-link:hover { color: var(--accent-blue); }

.status-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500;
  cursor: pointer; white-space: nowrap;
}
.s-new { color: var(--text-muted); background: var(--bg-surface); }
.s-called { color: var(--tier-warm); background: rgba(245,158,11,0.09); }
.s-confirmed { color: var(--tier-hot); background: rgba(34,197,94,0.09); }
.s-rejected { color: var(--tier-dead); background: rgba(239,68,68,0.09); }

.status-dropdown {
  position: fixed; z-index: 999;
  background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: 6px; padding: 4px; min-width: 150px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.6);
}
.status-dropdown button {
  display: block; width: 100%; text-align: left;
  padding: 6px 10px; font-size: 12px; color: var(--text-secondary);
  border-radius: 4px; transition: background 100ms;
}
.status-dropdown button:hover { background: var(--bg-surface-hover); color: var(--text-primary); }

/* ── EMPTY STATE ── */
#empty-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 320px; color: var(--text-muted);
  text-align: center; gap: 10px;
}
#empty-state svg { opacity: 0.25; }
#empty-state p { font-size: 13px; max-width: 260px; line-height: 1.5; }

/* ── DRAWER ── */
#drawer-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.55);
  z-index: 200; opacity: 0; pointer-events: none;
  transition: opacity 200ms;
}
#drawer-overlay.vis { opacity: 1; pointer-events: all; }

#drawer {
  position: fixed; top: 0; right: 0; bottom: 0; width: 420px;
  background: var(--bg-surface); border-left: 1px solid var(--border);
  z-index: 201; transform: translateX(100%);
  transition: transform 300ms cubic-bezier(0.4, 0, 0.2, 1);
  overflow-y: auto; display: flex; flex-direction: column;
}
#drawer.open { transform: translateX(0); }
#drawer-content { flex: 1; padding: 20px; }

.d-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
.d-title { font-size: 15px; font-weight: 600; }
.d-subtitle { font-size: 11px; color: var(--text-secondary); font-family: var(--font-mono); margin-top: 2px; }
.d-close {
  width: 28px; height: 28px; border-radius: 5px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted); transition: background 100ms, color 100ms;
}
.d-close:hover { background: var(--bg-elevated); color: var(--text-primary); }

.d-divider { height: 1px; background: var(--border); margin: 14px 0; }

.d-score-row {
  display: flex; align-items: baseline; gap: 10px; margin-bottom: 2px;
}
.d-score-num { font-family: var(--font-mono); font-size: 30px; font-weight: 500; }
.d-score-denom { font-family: var(--font-mono); font-size: 14px; color: var(--text-muted); }

.d-label {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 8px;
}

.d-card {
  background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: 6px; padding: 12px; margin-bottom: 10px;
}
.d-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 8px; flex-wrap: wrap;
}
.d-row:last-child { margin-bottom: 0; }
.d-row svg { color: var(--text-muted); flex-shrink: 0; }
.d-name { font-size: 14px; font-weight: 600; }
.d-phone { font-family: var(--font-mono); font-size: 13px; }
.d-meta { font-size: 11px; color: var(--text-muted); margin-top: 6px; line-height: 1.5; }

.icon-btn {
  height: 26px; padding: 0 8px; border-radius: 4px;
  background: var(--bg-surface); border: 1px solid var(--border);
  color: var(--text-muted); font-size: 11px;
  display: inline-flex; align-items: center; gap: 4px;
  transition: all 100ms; white-space: nowrap;
}
.icon-btn:hover { color: var(--text-primary); background: var(--bg-surface-hover); }
.icon-btn svg { width: 12px; height: 12px; }

.d-reg-row {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; color: var(--text-secondary); margin-bottom: 5px;
}
.d-reg-row svg { width: 13px; height: 13px; color: var(--tier-hot); flex-shrink: 0; }
.d-reg-row.unv svg { color: var(--text-muted); }

.reasoning-box {
  background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: 6px; padding: 12px;
  font-family: var(--font-mono); font-size: 11px;
  color: var(--text-secondary); line-height: 1.7;
  white-space: pre-wrap; word-break: break-word;
}

.other-ct {
  font-size: 12px; color: var(--text-secondary);
  padding: 6px 0; border-bottom: 1px solid var(--border-subtle);
  display: flex; gap: 6px; flex-wrap: wrap;
}
.other-ct:last-child { border-bottom: none; }
.other-ct .mono { font-family: var(--font-mono); font-size: 11px; }

.action-btn {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 9px 12px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--bg-elevated);
  color: var(--text-secondary); font-size: 13px; text-align: left;
  transition: all 150ms; margin-bottom: 6px;
}
.action-btn:hover:not(:disabled) { background: var(--bg-surface-hover); color: var(--text-primary); }
.action-btn.done { color: var(--tier-hot); border-color: rgba(34,197,94,0.25); background: rgba(34,197,94,0.05); cursor: default; }
.action-btn.done svg { color: var(--tier-hot); }
.action-btn:last-child { margin-bottom: 0; }
.row-del { opacity: 0; border: none; background: none; color: var(--text-muted); cursor: pointer; padding: 2px; border-radius: 4px; display: inline-flex; }
.row-del:hover { color: var(--tier-dead); background: rgba(220,38,38,0.08); }
tr:hover .row-del { opacity: 0.8; }

#drawer-notes {
  width: 100%; min-height: 80px;
  background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: 6px; padding: 10px 12px;
  color: var(--text-primary); font-size: 13px; resize: vertical; outline: none;
  transition: border-color 150ms; line-height: 1.5;
}
#drawer-notes:focus { border-color: var(--accent-blue); }
#save-notes-btn {
  margin-top: 8px; padding: 7px 14px;
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: 5px; font-size: 12px; color: var(--text-secondary);
  transition: all 150ms;
}
#save-notes-btn:hover { background: var(--bg-surface-hover); color: var(--text-primary); }

/* ── TOASTS ── */
#toast-container {
  position: fixed; bottom: 24px; right: 24px; z-index: 500;
  display: flex; flex-direction: column; gap: 8px; pointer-events: none;
}
.toast {
  background: var(--bg-elevated); border: 1px solid var(--border);
  border-left-width: 3px; border-radius: 6px; padding: 11px 14px;
  font-size: 13px; min-width: 260px; max-width: 340px;
  pointer-events: all; opacity: 0; transform: translateX(16px);
  transition: opacity 180ms, transform 180ms;
}
.toast.vis { opacity: 1; transform: translateX(0); }
.toast.success { border-left-color: var(--tier-hot); }
.toast.error { border-left-color: var(--tier-dead); }
.toast.info { border-left-color: var(--accent-blue); }
.toast-msg { color: var(--text-primary); }
.toast-sub { color: var(--text-muted); font-size: 12px; margin-top: 2px; }

/* ── CSV MODAL ── */
#csv-modal {
  position: fixed; inset: 0; z-index: 600;
  background: rgba(0,0,0,0.72);
  display: flex; align-items: center; justify-content: center;
}
.csv-inner {
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 24px; width: 460px; max-width: 90vw;
}
.csv-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.csv-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; line-height: 1.5; }
.progress-wrap { background: var(--bg-elevated); border-radius: 3px; height: 4px; overflow: hidden; margin: 10px 0; }
.progress-bar { height: 100%; background: var(--accent-blue); border-radius: 3px; transition: width 200ms; }
.progress-text { font-size: 12px; color: var(--text-secondary); font-family: var(--font-mono); }
.csv-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
.btn-primary {
  padding: 8px 16px; background: var(--accent-blue); color: #fff;
  border-radius: 5px; font-size: 13px; font-weight: 600; transition: background 150ms;
}
.btn-primary:hover:not(:disabled) { background: var(--accent-blue-hover); }
.btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }
.btn-sec {
  padding: 8px 16px; background: var(--bg-elevated); color: var(--text-secondary);
  border: 1px solid var(--border); border-radius: 5px; font-size: 13px; transition: all 150ms;
}
.btn-sec:hover { color: var(--text-primary); }

/* ── SPINNER ── */
@keyframes spin { to { transform: rotate(360deg); } }
.spin { animation: spin 700ms linear infinite; display: inline-flex; }

/* ── SOURCE TABS ── */
.source-tabs { display: flex; gap: 2px; }
.src-tab {
  height: 26px; padding: 0 10px; border-radius: 4px;
  font-size: 12px; font-weight: 500; color: var(--text-muted);
  transition: color 100ms, background 100ms;
}
.src-tab:hover { color: var(--text-secondary); }
.src-tab.active { color: var(--text-primary); background: var(--bg-elevated); border: 1px solid var(--border); }

/* ── SOURCE RESULTS MODAL ── */
#src-modal {
  position: fixed; inset: 0; z-index: 600;
  background: rgba(0,0,0,0.72);
  display: flex; align-items: center; justify-content: center;
}
.src-inner {
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 24px; width: 520px; max-width: 90vw;
  max-height: 80vh; display: flex; flex-direction: column;
}
.src-list { overflow-y: auto; flex: 1; margin: 12px 0; max-height: 360px; }
.src-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid var(--border-subtle);
}
.src-item:last-child { border-bottom: none; }
.src-item.agency { opacity: 0.4; }
.src-item-info { flex: 1; min-width: 0; }
.src-item-name { font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.src-item-url { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); margin-top: 2px; }
.src-item-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.src-item-warn { font-size: 11px; color: var(--tier-warm); margin-top: 2px; }
.src-item input[type="checkbox"] { width: 14px; height: 14px; accent-color: var(--accent-blue); flex-shrink: 0; margin-top: 2px; cursor: pointer; }
#src-select-count { font-size: 13px; color: var(--text-muted); }

/* ── RESPONSIVE ── */
@media (max-width: 1024px) { #drawer { width: 100%; } }
@media (max-width: 768px) {
  #topbar, #filter-bar, #main { padding-left: 14px; padding-right: 14px; }
  .topbar-row2 { padding-left: 0; }
  .col-score { display: none; }
  .col-kontakt { display: none; }
  #drawer { width: 100%; }
}

/* ── VIEW TOGGLE ── */
.view-toggle { display: flex; gap: 2px; margin-left: auto; flex-shrink: 0; }
.view-btn {
  height: 26px; padding: 0 10px; border-radius: 4px;
  font-size: 12px; font-weight: 500; color: var(--text-muted);
  transition: all 100ms; border: 1px solid transparent;
  display: inline-flex; align-items: center; gap: 5px;
}
.view-btn .vb-ic { display: inline-flex; }
.view-btn:hover { color: var(--text-secondary); }
.view-btn.active { color: var(--text-primary); background: var(--bg-elevated); border-color: var(--border); }

/* ── KANBAN ── */
#view-kanban { display: none; padding: 8px 0 80px; overflow-x: auto; }
.kanban-board {
  display: flex; gap: 10px; align-items: flex-start;
  min-width: max-content; padding: 4px 24px 8px;
}
.kanban-col {
  width: 210px; flex-shrink: 0; border-radius: 6px;
  background: var(--bg-surface); border: 1px solid var(--border);
  display: flex; flex-direction: column; min-height: 200px;
}
.kanban-col.drag-over { border-color: var(--accent-blue); background: rgba(79,110,247,0.05); }
.kanban-col-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.kanban-col-title { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
.kanban-col-count {
  font-family: var(--font-mono); font-size: 10px; background: var(--bg-elevated);
  color: var(--text-muted); padding: 0 5px; border-radius: 3px; min-width: 18px; text-align: center;
}
.kanban-col-body { padding: 6px; flex: 1; display: flex; flex-direction: column; gap: 5px; }
.kanban-card {
  background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: 5px; padding: 8px 9px; cursor: pointer; transition: border-color 120ms;
  user-select: none;
}
.kanban-card:hover { border-color: var(--text-muted); }
.kanban-card.dragging { opacity: 0.4; }
.kc-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.kc-name { font-size: 12px; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; line-height: 1.3; word-break: break-all; }
.kc-contact { font-size: 11px; color: var(--text-secondary); margin-bottom: 1px; }
.kc-phone { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
.kc-followup { font-size: 10px; margin-top: 4px; padding: 1px 5px; border-radius: 3px; display: inline-flex; align-items: center; gap: 3px; }
.kc-followup.today { background: rgba(245,158,11,0.15); color: var(--tier-warm); }
.kc-followup.overdue { background: rgba(239,68,68,0.12); color: var(--tier-dead); }
.kc-followup.future { color: var(--text-muted); }

/* ── CALENDAR ── */
#view-calendar { display: none; padding: 8px 24px 80px; }
.cal-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.cal-nav-btn {
  height: 28px; padding: 0 12px; border-radius: 5px;
  background: var(--bg-surface); border: 1px solid var(--border);
  color: var(--text-secondary); font-size: 12px; transition: all 100ms;
}
.cal-nav-btn:hover { color: var(--text-primary); }
.cal-range { font-size: 13px; font-weight: 500; color: var(--text-primary); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
.cal-day { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 6px; min-height: 140px; }
.cal-day.today { border-color: var(--accent-blue); }
.cal-day-hdr {
  padding: 7px 8px; border-bottom: 1px solid var(--border-subtle);
  font-size: 11px; font-weight: 600; color: var(--text-muted); text-align: center;
}
.cal-day.today .cal-day-hdr { color: var(--accent-blue); }
.cal-day-body { padding: 5px; display: flex; flex-direction: column; gap: 3px; }
.cal-event {
  padding: 3px 6px; border-radius: 3px; font-size: 10px; cursor: pointer;
  border-left: 2px solid transparent; background: var(--bg-elevated); line-height: 1.3;
  transition: background 100ms;
}
.cal-event:hover { background: var(--bg-surface-hover); }
.cal-event-name { font-weight: 600; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cal-event-contact { color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cal-event-note { color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── TODAY WIDGET ── */
#today-widget {
  display: flex; gap: 8px; padding: 10px 24px 6px; flex-wrap: wrap;
}
.tw-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: 5px; font-size: 12px; font-weight: 500;
  border: 1px solid var(--border); background: var(--bg-surface); cursor: pointer;
  transition: all 120ms; color: var(--text-secondary);
}
.tw-chip:hover { color: var(--text-primary); background: var(--bg-surface-hover); }
.tw-chip.active { border-color: var(--accent-blue); color: var(--accent-blue); background: rgba(79,110,247,0.08); }
.tw-count { font-family: var(--font-mono); font-size: 11px; }

/* ── QUICK ACTIONS ── */
.quick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 6px; }
.qa-btn {
  padding: 8px 10px; border: 1px solid var(--border); border-radius: 5px;
  background: var(--bg-elevated); font-size: 12px; font-weight: 500;
  color: var(--text-secondary); text-align: center; cursor: pointer;
  transition: all 120ms; line-height: 1.2; display: flex; align-items: center; justify-content: center;
  gap: 5px; text-decoration: none;
}
.qa-btn:hover { color: var(--text-primary); background: var(--bg-surface-hover); border-color: var(--text-muted); }
.qa-btn.qa-green:hover { color: var(--tier-hot); border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.05); }
.qa-btn.qa-orange:hover { color: var(--tier-warm); border-color: rgba(245,158,11,0.4); background: rgba(245,158,11,0.05); }

/* ── SNOOZE PANEL ── */
.snooze-panel {
  background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: 6px; padding: 10px 12px; margin-bottom: 6px; display: none;
}
.snooze-panel.open { display: block; }
.snooze-row { display: flex; gap: 6px; margin-bottom: 6px; align-items: center; }
.snooze-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }

/* ── HISTORY ── */
.history-list { max-height: 200px; overflow-y: auto; }
.hist-item {
  display: flex; gap: 8px; align-items: flex-start; padding: 5px 0;
  border-bottom: 1px solid var(--border-subtle); font-size: 12px;
}
.hist-item:last-child { border-bottom: none; }
.hist-ts { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); white-space: nowrap; flex-shrink: 0; min-width: 70px; }
.hist-body { color: var(--text-secondary); line-height: 1.4; }
.hist-icon { font-size: 11px; flex-shrink: 0; margin-top: 1px; }

/* ── FOLLOW-UP IN DRAWER ── */
.followup-row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
.followup-input {
  flex: 1; background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: 5px; padding: 6px 8px; color: var(--text-primary); font-size: 12px;
  outline: none; transition: border-color 150ms; font-family: var(--font-sans);
}
.followup-input:focus { border-color: var(--accent-blue); }
.followup-clear {
  width: 26px; height: 26px; border-radius: 4px; flex-shrink: 0;
  background: var(--bg-elevated); border: 1px solid var(--border);
  color: var(--text-muted); font-size: 12px; display: flex; align-items: center; justify-content: center;
}
.followup-clear:hover { color: var(--tier-dead); }
.followup-note-input {
  width: 100%; background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: 5px; padding: 6px 8px; color: var(--text-secondary); font-size: 12px;
  outline: none; transition: border-color 150ms;
}
.followup-note-input:focus { border-color: var(--accent-blue); }

/* ── STAGE PILLS ── */
.stage-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 500;
  white-space: nowrap; cursor: pointer; user-select: none;
}
.stage-selector {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; margin-bottom: 10px;
}
.stage-sel-btn {
  padding: 5px 2px; border-radius: 4px; font-size: 10px; line-height: 1.4;
  border: 1px solid var(--border); background: var(--bg-elevated);
  color: var(--text-muted); text-align: center; cursor: pointer;
  transition: all 100ms; white-space: nowrap;
}
.stage-sel-btn:hover { color: var(--text-secondary); background: var(--bg-surface-hover); }
.stage-sel-btn.s-active { font-weight: 600; }

/* ── MANUAL BADGE + EDIT PENCIL ── */
.manual-badge {
  font-size: 10px; color: var(--tier-warm); background: rgba(245,158,11,0.1);
  border: 1px solid rgba(245,158,11,0.25); border-radius: 3px; padding: 1px 5px;
  flex-shrink: 0;
}
.edit-pencil {
  opacity: 0; height: 20px; padding: 0 5px; border-radius: 3px; flex-shrink: 0;
  background: transparent; border: 1px solid transparent;
  color: var(--text-muted); font-size: 11px; transition: opacity 100ms;
}
.d-row:hover .edit-pencil, .edit-pencil.always { opacity: 1; }
.edit-pencil:hover { background: var(--bg-elevated); border-color: var(--border); color: var(--text-primary); }
.edit-input {
  flex: 1; min-width: 0; background: var(--bg-primary); border: 1px solid var(--accent-blue);
  border-radius: 4px; padding: 3px 8px; color: var(--text-primary); font-size: 13px; outline: none;
}

/* ── MULTI-NOTES ── */
.notes-list { margin-bottom: 8px; max-height: 220px; overflow-y: auto; }
.note-item {
  padding: 7px 0; border-bottom: 1px solid var(--border-subtle); position: relative;
}
.note-item:last-child { border-bottom: none; }
.note-ts { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); margin-bottom: 3px; }
.note-text { font-size: 13px; line-height: 1.5; color: var(--text-secondary); white-space: pre-wrap; word-break: break-word; padding-right: 22px; }
.note-del {
  position: absolute; top: 6px; right: 0; padding: 2px 5px; border-radius: 3px;
  color: var(--text-muted); font-size: 12px; opacity: 0; transition: opacity 100ms;
}
.note-item:hover .note-del { opacity: 1; }
.note-del:hover { color: var(--tier-dead); }
.note-add-wrap { display: flex; gap: 6px; align-items: flex-end; }
.note-add-input {
  flex: 1; background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: 5px; padding: 7px 10px; color: var(--text-primary); font-size: 13px;
  resize: none; outline: none; min-height: 36px; max-height: 100px;
  transition: border-color 150ms; line-height: 1.4; overflow-y: auto;
}
.note-add-input:focus { border-color: var(--accent-blue); }
.note-add-btn {
  height: 36px; padding: 0 12px; background: var(--bg-elevated);
  border: 1px solid var(--border); border-radius: 5px; font-size: 12px;
  color: var(--text-secondary); transition: all 150ms; flex-shrink: 0;
}
.note-add-btn:hover { color: var(--text-primary); background: var(--bg-surface-hover); }
</style>
</head>

    if (v2.length) {

        scraped_at: l.scraped_at || new Date().toISOString()
      }));
      localStorage.setItem(STORAGE_KEY, JSON.stringify(raw));
    }
  }
  leads = raw.filter(l => l.data && l.data.score !== undefined);
  // kôš: auto-purge leadov vymazaných pred viac ako 30 dňami
  const cutoff = Date.now() - 30 * 24 * 3600 * 1000;
  leads = leads.filter(l => !(l.deleted && l.deleted_at && new Date(l.deleted_at).getTime() < cutoff));
  leads.forEach(initDefaults);
}
function saveLeads() {
  if (leads.length > MAX_LEADS) {
    const dead = leads.filter(l => l.data?.tier === 'DEAD').sort((a,b) => new Date(a.scraped_at) - new Date(b.scraped_at));
    const alive = leads.filter(l => l.data?.tier !== 'DEAD');
    leads = [...alive, ...dead].slice(0, MAX_LEADS);
  }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(leads));
}

let scrapeChannel = 'url'; // which source tab produced the current scrape batch

// Jednotný formát URL — kľúč na párovanie leadov v localStorage.
// "leofan.sk", "https://www.leofan.sk/", "http://leofan.sk" → "https://leofan.sk"
function normUrl(u) {
  const s = (u || '').trim().toLowerCase()
    .replace(/^https?:\/\//, '').replace(/^www\./, '').replace(/\/+$/, '');
  return s ? 'https://' + s : '';
}

function upsertLead(data) {
  const url = normUrl(data.url);
  data.url = url;
  const idx = leads.findIndex(l => normUrl(l.url) === url);
  const ts = data.scraped_at || new Date().toISOString();
  if (idx >= 0) {
    const ex = leads[idx];
    addHistory(ex, 'scraped', '');
    leads[idx] = {...ex, data, scraped_at: ts};
  } else {
    const nl = {url, data, source: scrapeChannel, stage: 'new', followup_date: null, followup_note: '', notes: [], history: [], overrides: {phone: null, email: null, contact_name: null}, scraped_at: ts};
    addHistory(nl, 'scraped', '');
    leads.unshift(nl);
  }
  saveLeads();
}

// ── API ──
async function apiScrape(url) {
  const resp = await fetch(`${API}/api/leads/scrape`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': TOKEN },
    body: JSON.stringify({ url })
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({ detail: resp.statusText }));
    throw new Error(err.detail || `HTTP ${resp.status}`);
  }
  return resp.json();
}
async function apiConfirm(url, confirmation_type, extra = {}) {
  try {
    await fetch(`${API}/api/leads/confirm`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': TOKEN },
      body: JSON.stringify({ url, confirmation_type, ...extra })
    });
  } catch (_) { /* 404 or network — ignore, stored locally */ }
}

const SOURCE_LABELS = {
  url: 'Priama URL', profesia: 'Profesia', heureka: 'Heureka',
  eshops: 'E-shopy', orsr_new: 'Nové firmy', maps: 'Maps', csv: 'CSV', manual: 'Manuálny',
};
function deAccent(s) {
  return (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}
function leadMatchesSearch(l, q) {
  const needle = deAccent(q.trim());
  if (!needle) return true;
  const pc = l.data?.primary_contact || {};
  const ov = l.overrides || {};
  const hay = deAccent([l.url, l.data?.company_name, pc.name, ov.contact_name]
    .filter(Boolean).join(' '));
  if (hay.includes(needle)) return true;
  // telefón — aj čiastočná zhoda číslic (napr. posledné 4)
  const nd = needle.replace(/\D/g, '');
  if (nd.length >= 3) {
    const phones = [pc.phone, ov.phone, ...(l.data?.all_phones || [])]
      .filter(Boolean)
      .map(p => String(typeof p === 'object' ? p.value : p).replace(/\D/g, ''));
    if (phones.some(p => p.includes(nd))) return true;
  }
  return false;
}
function onSearchInput(v) {
  filters.search = v;
  if (currentView === 'calendar') renderCalendar();
  else if (currentView === 'trash') renderTrash();
  else render();
}
function passesFilters(l) {
  if (l.deleted) return false;
  if (filters.search && !leadMatchesSearch(l, filters.search)) return false;
  if (filters.tiers.length && !filters.tiers.includes(l.data?.tier)) return false;
  if (filters.stages.length && !filters.stages.includes(l.stage || 'new')) return false;
  if (filters.followup !== 'all') {
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const fd = l.followup_date ? new Date(l.followup_date) : null;
    if (filters.followup === 'yes' && !fd) return false;
    if (filters.followup === 'no' && fd) return false;
    if (filters.followup === 'overdue' && !(fd && fd < today)) return false;
  }
  if (filters.sources.length && !filters.sources.includes(l.source || 'url')) return false;
  return true;
}
function toggleArrFilter(key, val) {
  const arr = filters[key];
  const i = arr.indexOf(val);
  if (i >= 0) arr.splice(i, 1); else arr.push(val);
  onFiltersChanged();
}
function setFollowupFilter(val) { filters.followup = val; onFiltersChanged(); }
function clearTierFilter() { filters.tiers = []; onFiltersChanged(); }
function onFiltersChanged() {
  renderFilterBar();
  if (currentView === 'calendar') renderCalendar();
  else render();
}
function renderFilterBar() {
  const el = document.getElementById('filter-controls');
  if (!el) return;
  const active = leads.filter(l => !l.deleted);
  const counts = { HOT: 0, WARM: 0, COOL: 0, DEAD: 0 };
  active.forEach(l => { const t = l.data?.tier; if (counts[t] !== undefined) counts[t]++; });
  const tierBtns = ['HOT', 'WARM', 'COOL', 'DEAD'].map(t =>
    `<button class="filter-btn${filters.tiers.includes(t) ? ' active' : ''}" onclick="toggleArrFilter('tiers','${t}')">
      <span class="tier-dot" style="background:var(--tier-${t.toLowerCase()})"></span>${t} <span class="filter-count">${counts[t]}</span>
    </button>`).join('');
  const stageActive = filters.stages.length;
  const srcActive = filters.sources.length;
  const fuLabels = { all: 'Follow-up', yes: 'Má follow-up', no: 'Bez follow-upu', overdue: 'Po termíne' };
  el.innerHTML = `
    <button class="filter-btn${!filters.tiers.length ? ' active' : ''}" onclick="clearTierFilter()">Všetky <span class="filter-count">${active.length}</span></button>
    ${tierBtns}
    <span style="width:1px;height:16px;background:var(--border);margin:0 4px;flex-shrink:0"></span>
    <button class="filter-btn${stageActive ? ' active' : ''}" onclick="showFilterDd(event,'stages')">
      Fáza${stageActive ? ` <span class="filter-count">${stageActive}</span>` : ''} ${ic.chevD}
    </button>
    <button class="filter-btn${filters.followup !== 'all' ? ' active' : ''}" onclick="showFilterDd(event,'followup')">
      ${esc(fuLabels[filters.followup])} ${ic.chevD}
    </button>
    <button class="filter-btn${srcActive ? ' active' : ''}" onclick="showFilterDd(event,'sources')">
      Zdroj${srcActive ? ` <span class="filter-count">${srcActive}</span>` : ''} ${ic.chevD}
    </button>`;
}
function showFilterDd(e, kind) {
  e.stopPropagation();
  closeDd();
  const rect = e.currentTarget.getBoundingClientRect();
  const dd = document.createElement('div');
  dd.className = 'status-dropdown';
  dd.style.cssText = `top:${rect.bottom + 4}px;left:${rect.left}px;min-width:180px`;
  dd.addEventListener('click', ev => ev.stopPropagation());
  if (kind === 'stages') {
    dd.innerHTML = STAGE_ORDER.map(sid => {
      const s = STAGES[sid];
      const on = filters.stages.includes(sid);
      return `<button onclick="toggleArrFilter('stages','${sid}')" style="display:flex;align-items:center;gap:7px${on ? ';color:var(--text-primary)' : ''}">
        ${stageDot(s.color, 6)}${esc(s.label)}${on ? '<span style="margin-left:auto">✓</span>' : ''}</button>`;
    }).join('');
  } else if (kind === 'followup') {
    const opts = [['all', 'Všetky'], ['yes', 'Má follow-up'], ['no', 'Bez follow-upu'], ['overdue', 'Po termíne']];
    dd.innerHTML = opts.map(([v, lab]) =>
      `<button onclick="setFollowupFilter('${v}');closeDd()" style="display:flex;align-items:center;gap:7px${filters.followup === v ? ';color:var(--text-primary)' : ''}">
        ${esc(lab)}${filters.followup === v ? '<span style="margin-left:auto">✓</span>' : ''}</button>`).join('');
  } else {
    const present = [...new Set(leads.map(l => l.source || 'url'))];
    dd.innerHTML = present.map(src => {
      const on = filters.sources.includes(src);
      return `<button onclick="toggleArrFilter('sources','${esc(src)}')" style="display:flex;align-items:center;gap:7px${on ? ';color:var(--text-primary)' : ''}">
        ${esc(SOURCE_LABELS[src] || src)}${on ? '<span style="margin-left:auto">✓</span>' : ''}</button>`;
    }).join('') || '<button disabled>Žiadne zdroje</button>';
  }
  document.body.appendChild(dd);
  activeDd = dd;
}

// ── RENDER ──
function filteredSorted() {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
  let list = leads.filter(passesFilters);
  if (widgetFollowupFilter) list = list.filter(l => {
    if (!l.followup_date) return false;
    const fd = new Date(l.followup_date); return fd >= today && fd < tomorrow;
  });
  if (widgetHotFilter) list = list.filter(l => l.data?.tier === 'HOT' && (l.stage || 'new') === 'new');
  list.sort((a, b) => {
    const av = a.data?.[sortField] ?? 0, bv = b.data?.[sortField] ?? 0;
    return sortDir === 'desc' ? bv - av : av - bv;
  });
  return list;
}

  const table = document.getElementById('leads-table');
  const empty = document.getElementById('empty-state');
  if (leads.length === 0) { table.style.display = 'none'; empty.style.display = 'flex'; return; }
  table.style.display = 'table'; empty.style.display = 'none';
  tbody.innerHTML = list.map(l => rowHtml(l)).join('');
}

function setView(v) {
  currentView = v;
  document.getElementById('view-kanban').style.display = v === 'kanban' ? 'block' : 'none';
  document.getElementById('view-calendar').style.display = v === 'calendar' ? 'block' : 'none';
  document.getElementById('view-trash').style.display = v === 'trash' ? 'block' : 'none';
  const tableEl = document.getElementById('leads-table');
  const emptyEl = document.getElementById('empty-state');
  if (v !== 'table') { tableEl.style.display = 'none'; emptyEl.style.display = 'none'; }
  document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.id === `vbtn-${v}`));
  if (v === 'calendar') renderCalendar();
  else if (v === 'trash') { updateCounts(); renderTrash(); }
  else render();
  updateTodayWidget();
}

// ── KÔŠ (soft delete) ──
function updateTrashCount() {
  const el = document.getElementById('trash-count');
  if (el) el.textContent = leads.filter(l => l.deleted).length;
}
function deleteLead(url) {
  const lead = leads.find(l => l.url === url);
  if (!lead) return;
  lead.deleted = true;
  lead.deleted_at = new Date().toISOString();
  addHistory(lead, 'deleted', 'presunutý do koša');
  saveLeads();
  if (openUrl === url) closeDrawer();
  if (currentView === 'calendar') renderCalendar(); else render();
  updateTrashCount(); updateTodayWidget();
}
function restoreLead(url) {
  const lead = leads.find(l => l.url === url);
  if (!lead) return;
  lead.deleted = false;
  lead.deleted_at = null;
  addHistory(lead, 'restored', 'obnovený z koša');
  saveLeads();
  renderTrash(); updateCounts(); updateTrashCount(); updateTodayWidget();
}
function purgeLead(url) {
  if (!confirm('Naozaj vymazať natrvalo? Toto sa nedá vrátiť.')) return;
  const idx = leads.findIndex(l => l.url === url);
  if (idx < 0) return;
  leads.splice(idx, 1);
  saveLeads();
  renderTrash(); updateCounts(); updateTrashCount();
}
function renderTrash() {
  const el = document.getElementById('view-trash');
  if (!el) return;
  const trashed = leads.filter(l => l.deleted)
    .sort((a, b) => new Date(b.deleted_at || 0) - new Date(a.deleted_at || 0));
  if (!trashed.length) {
    el.innerHTML = `<div style="text-align:center;color:var(--text-muted);padding:60px 0;font-size:13px">Kôš je prázdny</div>`;
    return;
  }
  el.innerHTML = `
    <div style="font-size:11px;color:var(--text-muted);margin:8px 0 12px">Leady v koši sa po 30 dňoch automaticky natrvalo vymažú.</div>
    ${trashed.map(l => {
      const pc = l.data?.primary_contact || {};
      const del = l.deleted_at ? new Date(l.deleted_at).toLocaleDateString('sk-SK', {day:'2-digit', month:'2-digit', year:'numeric'}) : '';
      const u = esc(l.url);
      return `<div style="display:flex;align-items:center;gap:14px;padding:10px 14px;margin-bottom:6px;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;color:var(--text-primary)">${esc(strip(l.url))}</div>
          <div style="font-size:12px;color:var(--text-muted)">${esc(pc.name || '—')}${pc.phone ? ' · ' + esc(fmtPhone(pc.phone)) : ''} · vymazaný ${esc(del)}</div>
        </div>
        <button class="filter-btn" onclick="restoreLead('${u}')">Obnoviť</button>
        <button class="filter-btn" style="color:var(--tier-dead)" onclick="purgeLead('${u}')">Vymazať natrvalo</button>
      </div>`;
    }).join('')}`;
}

function renderKanban() {
  const board = document.getElementById('kanban-board');
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);

  board.innerHTML = STAGE_ORDER.map(sid => {
    const s = STAGES[sid];
    const colLeads = leads.filter(l => passesFilters(l) && (l.stage || 'new') === sid)
      .sort((a, b) => (b.data?.score ?? 0) - (a.data?.score ?? 0));

    const cards = colLeads.map(l => {
      const d = l.data || {};
      const pc = d.primary_contact || {};
      const ov = l.overrides || {};
      const tier = d.tier || 'DEAD';
      const name = strip(l.url);
      const contact = ov.contact_name || pc.name || '';
      const phone = ov.phone || pc.phone || '';
      const u = esc(l.url);

      let followupBadge = '';
      if (l.followup_date) {
        const fd = new Date(l.followup_date); fd.setHours(0, 0, 0, 0);
        const dateStr = new Date(l.followup_date).toLocaleDateString('sk-SK', {day:'2-digit', month:'2-digit'});
        if (fd < today) followupBadge = `<span class="kc-followup overdue">${icon('alert', 9, 2)} ${dateStr}</span>`;
        else if (fd.getTime() === today.getTime()) followupBadge = `<span class="kc-followup today">${icon('calendar', 9, 2)} Dnes</span>`;
        else followupBadge = `<span class="kc-followup future">${icon('calendar', 9, 2)} ${dateStr}</span>`;
      }

      return `<div class="kanban-card" data-url="${u}" draggable="true"
          onclick="openDrawer(this.dataset.url)"
          ondragstart="kdragStart(event, this.dataset.url)"
          ondragend="kdragEnd(event)">
        <div class="kc-top">
          <span class="tier-badge t-${esc(tier)}" style="font-size:10px"><span class="tier-dot"></span>${esc(tier)}</span>
          <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted)">${d.score ?? '?'}</span>
        </div>
        <div class="kc-name">${esc(name)}</div>
        ${contact ? `<div class="kc-contact">${esc(contact)}</div>` : ''}
        ${phone ? `<div class="kc-phone">${esc(fmtPhone(phone))}</div>` : ''}
        ${followupBadge}
      </div>`;
    }).join('');

    return `<div class="kanban-col" data-stage="${sid}"
        ondragover="kdragOver(event)"
        ondragleave="kdragLeave(event)"
        ondrop="kdrop(event, '${sid}')">
      <div class="kanban-col-hdr">
        <span class="kanban-col-title" style="color:${s.color};display:inline-flex;align-items:center;gap:6px">${stageDot(s.color, 6)}${esc(s.label)}</span>
        <span class="kanban-col-count">${colLeads.length}</span>
      </div>
      <div class="kanban-col-body">${cards || '<div style="font-size:11px;color:var(--text-muted);padding:6px 0;text-align:center">–</div>'}</div>
    </div>`;
  }).join('');
}

function kdragStart(e, url) {
  draggedUrl = url;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => e.target.classList.add('dragging'), 0);
}
function kdragEnd(e) { e.target.classList.remove('dragging'); }
function kdragOver(e) {
  e.preventDefault(); e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}
function kdragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function kdrop(e, stageId) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!draggedUrl) return;
  const lead = leads.find(l => l.url === draggedUrl);
  if (lead && lead.stage !== stageId) {
    addHistory(lead, 'stage_change', `${lead.stage || 'new'} → ${stageId}`);
    lead.stage = stageId;
    saveLeads();
    renderKanban();
    if (openUrl === draggedUrl) renderDrawer(draggedUrl);
  }
  draggedUrl = null;
}

function rowHtml(l) {
  const d = l.data || {};
  const tier = d.tier || 'DEAD';
  const pc = d.primary_contact || {};
  const score = d.score ?? '—';
  const companyRaw = d.company_name || '';
  const urlDisplay = strip(l.url);
  const phone = pc.phone || '';
  const status = l.status || 'new';
  const u = esc(l.url);
  const contactLabel = pc.name ? (pc.role ? `${esc(pc.name)} · <span style="color:var(--text-muted)">${esc(pc.role)}</span>` : esc(pc.name)) : '—';
  const isManual = tier === 'MANUAL_REVIEW';

  return `<tr onclick="openDrawer('${u}')">
    <td class="col-tier"><span class="tier-badge t-${esc(tier)}"><span class="tier-dot"></span>${isManual ? 'MANUÁL' : esc(tier)}</span></td>
    <td class="col-firma">
      <a class="firma-name" href="${u}" target="_blank" onclick="event.stopPropagation()" style="color:var(--text-primary);text-decoration:none">${esc(urlDisplay)}</a>
      ${isManual ? `<div style="margin-top:2px"><span class="manual-review-badge">${icon('alert', 10, 2)} Vyžaduje manuálnu kontrolu</span></div>` : companyRaw ? `<div class="firma-url">${esc(companyRaw)}</div>` : ''}
    </td>
    <td class="col-kontakt" style="color:var(--text-secondary);font-size:13px">${contactLabel}</td>
    <td class="col-telefon">
      ${phone ? `<a class="phone-link" href="${esc(telHref(phone))}" onclick="event.stopPropagation()">${esc(fmtPhone(phone))}</a>` : '<span style="color:var(--text-muted)">—</span>'}
    </td>
    <td class="col-score"><span class="score-val">${score}</span></td>
    <td class="col-status" onclick="event.stopPropagation()">
      <span style="display:inline-flex;align-items:center;gap:6px">
        ${stageHtml(l.stage || 'new', u)}
        <button class="row-del" title="Vymazať (presunúť do koša)" onclick="deleteLead('${u}')">${icon('trash', 12, 1.8)}</button>
      </span>
    </td>
  </tr>`;
}

function updateCounts() { renderFilterBar(); updateTrashCount(); }

// ── STAGE DROPDOWN ──
function showStageDd(e, url) {
  e.stopPropagation();
  closeDd();
  const rect = e.currentTarget.getBoundingClientRect();
  const dd = document.createElement('div');
  dd.id = 'active-dd'; dd.className = 'status-dropdown';
  dd.style.cssText = `top:${rect.bottom + 4}px;left:${rect.left}px;min-width:180px`;
  dd.innerHTML = STAGE_ORDER.map(sid => {
    const s = STAGES[sid];
    return `<button onclick="setStage(event,'${esc(url)}','${sid}')" style="display:flex;align-items:center;gap:7px">${stageDot(s.color, 6)}${esc(s.label)}</button>`;
  }).join('');
  document.body.appendChild(dd);
  activeDd = dd;
}
function closeDd() {
  if (activeDd) { activeDd.remove(); activeDd = null; }
}
function setStage(e, url, stageId) {
  if (e) e.stopPropagation();
  const lead = leads.find(l => l.url === url);
  if (!lead || lead.stage === stageId) { closeDd(); return; }
  addHistory(lead, 'stage_change', `${lead.stage || 'new'} → ${stageId}`);
  lead.stage = stageId;
  saveLeads(); render(); closeDd();
  if (openUrl === url) renderDrawer(url);
}
function setDrawerStage(stageId) {
  if (openUrl) setStage(null, openUrl, stageId);
}
document.addEventListener('click', closeDd);

// ── DRAWER ──
function openDrawer(url) {
  openUrl = url;
  renderDrawer(url);
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('vis');
  document.getElementById('drawer').scrollTop = 0;
}
function closeDrawer() {
  openUrl = null;
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('vis');
  document.querySelectorAll('.leads-table tbody tr').forEach(r => r.classList.remove('selected'));
}
document.getElementById('drawer-overlay').addEventListener('click', closeDrawer);

async function confirmAction(url, type) {
  const lead = leads.find(l => l.url === url);
  if (!lead || lead.confirmed_type) return;
  lead.confirmed_type = type;
  lead.status = confirmToStatus(type);
  lead.confirmed_at = new Date().toISOString();
  saveLeads();
  render();
  renderDrawer(url);
  toast('Kontakt potvrdený', 'info');
  await apiConfirm(url, type, { confirmed_name: lead.data?.primary_contact?.name, confirmed_phone: lead.data?.primary_contact?.phone });
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => toast('Skopírované!', 'success')).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    toast('Skopírované!', 'success');
  });
}

// ── CRM HELPERS ──
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

function initDefaults(l) {
  if (!l.stage) {
    l.stage = {new:'new', called:'called_no', confirmed:'contacted', rejected:'rejected'}[l.status] || 'new';
  }
  if (l.followup_date === undefined) l.followup_date = null;
  if (!l.followup_note) l.followup_note = '';
  if (!Array.isArray(l.notes)) {
    const old = l.notes;
    l.notes = (old && old.trim && old.trim()) ? [{id: uid(), ts: l.scraped_at || new Date().toISOString(), text: old.trim()}] : [];
  }
  if (!l.history) l.history = [];
  if (!l.overrides) l.overrides = {phone: null, email: null, contact_name: null};
  if (l.deleted === undefined) l.deleted = false;
  if (l.deleted_at === undefined) l.deleted_at = null;
}

function addHistory(l, type, data) {
  if (!l.history) l.history = [];
  l.history.unshift({ts: new Date().toISOString(), type, data: data || ''});
  if (l.history.length > 100) l.history.length = 100;
}

function timeAgo(ts) {
  const d = Date.now() - new Date(ts).getTime();
  const m = Math.floor(d / 60000);
  if (m < 1) return 'práve teraz';
  if (m < 60) return `pred ${m}m`;
  const h = Math.floor(m / 60);
  if (h < 24) return `pred ${h}h`;
  const dy = Math.floor(h / 24);
  return dy < 7 ? `pred ${dy}d` : new Date(ts).toLocaleDateString('sk-SK');
}

function structuredReasoningHtml(rs) {
  const phones = (rs.vsetky_cisla || []).map(n =>
    `<div class="rs-phone-item"><span class="mono">${esc(fmtPhone(n.cislo))}</span><span class="rs-ctx">${esc(n.kontext || '')}${n.ukazka ? `<br><span style="font-style:italic">${esc(n.ukazka)}</span>` : ''}</span></div>`
  ).join('') || '<div class="rs-body" style="color:var(--text-muted)">žiadne čísla nenájdené</div>';
  const sec = (title, body) =>
    `<div class="rs-section"><div class="rs-title">${title}</div><div class="rs-body">${body}</div></div>`;
  return `<div class="d-card" style="padding:4px 12px">
    ${sec('1 · Register', esc(rs.register || '—'))}
    ${sec('2 · Zhoda mena', esc(rs.zhoda_mena || '—'))}
    ${sec('3 · Všetky čísla na stránke', phones)}
    ${sec('4 · Vybrané číslo', esc(rs.vybrane_cislo || '—'))}
    ${sec('5 · Email', esc(rs.email || '—'))}
    ${rs.dokaz ? sec('6 · Dôkaz (úryvok z webu)', esc(rs.dokaz)) : ''}
  </div>`;
}

function stageHtml(stageId, urlEsc) {
  const s = STAGES[stageId] || STAGES.new;
  return `<span class="stage-pill" style="color:${s.color};background:${s.color}18"
    onclick="showStageDd(event,'${urlEsc}')">${stageDot(s.color, 6)} ${esc(s.short)} ${ic.chevD}</span>`;
}

function notesHtml(lead) {
  const ns = lead.notes || [];
  if (!ns.length) return '<div style="font-size:12px;color:var(--text-muted);padding:4px 0">Žiadne poznámky</div>';
  return ns.map(n => `<div class="note-item">
    <div class="note-ts">${timeAgo(n.ts)} · ${new Date(n.ts).toLocaleString('sk-SK', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'})}</div>
    <div class="note-text">${esc(n.text)}</div>
    <button class="note-del" onclick="deleteNote('${esc(n.id)}')" title="Zmazať">✕</button>
  </div>`).join('');
}

function addNote() {
  const inp = document.getElementById('note-add-input');
  const text = (inp?.value || '').trim();
  if (!text || !openUrl) return;
  const lead = leads.find(l => l.url === openUrl);
  if (!lead) return;
  if (!lead.notes) lead.notes = [];
  if (lead.notes.length >= 20) { toast('Max 20 poznámok', 'error'); return; }
  lead.notes.unshift({id: uid(), ts: new Date().toISOString(), text});
  addHistory(lead, 'note_added', text.slice(0, 60));
  saveLeads();
  renderDrawer(openUrl);
}

function deleteNote(noteId) {
  if (!openUrl) return;
  const lead = leads.find(l => l.url === openUrl);
  if (!lead) return;
  lead.notes = (lead.notes || []).filter(n => n.id !== noteId);
  saveLeads();
  renderDrawer(openUrl);
}

function editContact(field) {
  const lead = leads.find(l => l.url === openUrl);
  if (!lead) return;
  const pc = lead.data?.primary_contact || {};
  const ov = lead.overrides || {};
  const rawKey = field === 'contact_name' ? 'name' : field;
  const current = ov[field] || pc[rawKey] || '';
  const el = document.getElementById(`ec-${field}`);
  if (!el) return;
  const row = el.closest('.d-row');
  const inp = document.createElement('input');
  inp.type = 'text'; inp.value = current; inp.className = 'edit-input';
  el.replaceWith(inp);
  row.querySelector('.manual-badge')?.remove();
  row.querySelector('.edit-pencil')?.remove();
  const saveBtn = document.createElement('button');
  saveBtn.className = 'icon-btn'; saveBtn.textContent = 'Uložiť';
  saveBtn.onclick = () => saveContactEdit(field, inp.value);
  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'icon-btn'; cancelBtn.textContent = 'Zrušiť';
  cancelBtn.onclick = () => renderDrawer(openUrl);
  inp.after(saveBtn); saveBtn.after(cancelBtn);
  inp.focus(); inp.select();
}

function saveContactEdit(field, newVal) {
  const lead = leads.find(l => l.url === openUrl);
  if (!lead) return;
  newVal = newVal.trim();
  if (!lead.overrides) lead.overrides = {phone: null, email: null, contact_name: null};
  lead.overrides[field] = newVal || null;
  addHistory(lead, 'contact_edited', `${field}: ${newVal}`);
  saveLeads();
  renderDrawer(openUrl);
}

// ── QUICK ACTIONS ──
function qaCall() {
  const lead = leads.find(l => l.url === openUrl);
  if (!lead) return;
  addHistory(lead, 'call', 'Volaný — bez odpovede');
  if (lead.stage === 'new') {
    lead.stage = 'called_no';
    addHistory(lead, 'stage_change', 'new → called_no');
  }
  saveLeads(); render(); renderDrawer(openUrl);
  toast('Označené: Volaný — bez odpovede', 'info');
}

function qaReached() {
  const lead = leads.find(l => l.url === openUrl);
  if (!lead) return;
  const old = lead.stage || 'new';
  lead.stage = 'contacted';
  addHistory(lead, 'stage_change', `${old} → contacted`);
  addHistory(lead, 'call', 'Dovolal som sa');
  saveLeads(); render(); renderDrawer(openUrl);
  toast('Označené: Kontaktovaný', 'success');
}

  if (panel) panel.classList.toggle('open');
}

function snoozeDefault() {
  const d = new Date(); d.setDate(d.getDate() + 7); d.setHours(9, 0, 0, 0);
  return d.toISOString().slice(0, 16);
}

function snoozeConfirm() {
  const lead = leads.find(l => l.url === openUrl);
  if (!lead) return;
  const dt = document.getElementById('snooze-dt')?.value || snoozeDefault();
  const note = (document.getElementById('snooze-note')?.value || '').trim();
  const old = lead.stage || 'new';
  lead.stage = 'snoozed';
  lead.followup_date = new Date(dt).toISOString();
  lead.followup_note = note;
  addHistory(lead, 'stage_change', `${old} → snoozed`);
  addHistory(lead, 'followup_set', dt.slice(0, 16) + (note ? ` — ${note}` : ''));
  saveLeads(); render();
  updateTodayWidget();
  if (currentView === 'kanban') renderKanban();
  if (currentView === 'calendar') renderCalendar();
  renderDrawer(openUrl);
  toast('Odložený: follow-up ' + new Date(dt).toLocaleDateString('sk-SK', {day:'2-digit', month:'2-digit'}), 'info');
}

const HIST_ICON = {
  scraped: 'refresh', stage_change: 'arrowR', note_added: 'note', note_deleted: 'trash',
  contact_edited: 'pencil', call: 'phone', followup_set: 'calendar',
};
const HIST_LABEL = {
  scraped: 'Scrape', stage_change: 'Fáza', note_added: 'Poznámka', note_deleted: 'Zmazaná pozn.',
  contact_edited: 'Kontakt', call: 'Hovor', followup_set: 'Follow-up',
};

function historyHtml(lead) {
  const hs = lead.history || [];
  if (!hs.length) return '<div style="font-size:12px;color:var(--text-muted);padding:4px 0">Žiadna aktivita</div>';
  return hs.map(h => {
    const iconHtml = HIST_ICON[h.type] ? icon(HIST_ICON[h.type], 12) : '·';
    const label = HIST_LABEL[h.type] || h.type;
    const stageData = h.type === 'stage_change' ? h.data.split(' → ').map(sid => {
      const s = STAGES[sid]; return s ? s.label : sid;
    }).join(' → ') : null;
    const body = stageData || (h.data ? esc(h.data.slice(0, 80)) : '');
    return `<div class="hist-item">
      <span class="hist-ts">${timeAgo(h.ts)}</span>
      <span class="hist-icon" style="color:var(--text-muted)">${iconHtml}</span>
      <span class="hist-body"><strong>${esc(label)}</strong>${body ? ': ' + body : ''}</span>
    </div>`;
  }).join('');
}

// ── TODAY WIDGET ──
let widgetFollowupFilter = false;
let widgetHotFilter = false;

function updateTodayWidget() {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
  const todayCount = leads.filter(l => {
    if (l.deleted || !l.followup_date) return false;
    const fd = new Date(l.followup_date);
    return fd >= today && fd < tomorrow;
  }).length;
  const hotNew = leads.filter(l => !l.deleted && l.data?.tier === 'HOT' && (l.stage || 'new') === 'new').length;

  const w = document.getElementById('today-widget');
  if (!w) return;
  if (todayCount === 0 && hotNew === 0) { w.style.display = 'none'; return; }
  w.style.display = 'flex';
  w.innerHTML = `
    ${todayCount > 0 ? `<button class="tw-chip${widgetFollowupFilter ? ' active' : ''}" onclick="toggleWidgetFollowup()">
      ${icon('phone', 12)} <span class="tw-count">${todayCount}</span> follow-up dnes
    </button>` : ''}
    ${hotNew > 0 ? `<button class="tw-chip${widgetHotFilter ? ' active' : ''}" onclick="toggleWidgetHot()">
      ${icon('flame', 12)} <span class="tw-count">${hotNew}</span> HOT nevolaných
    </button>` : ''}
  `;
}

function toggleWidgetFollowup() {
  widgetFollowupFilter = !widgetFollowupFilter;
  widgetHotFilter = false;
  if (currentView !== 'table') setView('table');
  else render();
  updateTodayWidget();
}
function toggleWidgetHot() {
  widgetHotFilter = !widgetHotFilter;
  widgetFollowupFilter = false;
  if (currentView !== 'table') setView('table');
  else render();
  updateTodayWidget();
}

// ── CALENDAR ──
let calWeekStart = mondayOfWeek(new Date());

function mondayOfWeek(d) {
  const dt = new Date(d); dt.setHours(0, 0, 0, 0);
  const day = dt.getDay(); // 0=Sun
  dt.setDate(dt.getDate() - (day === 0 ? 6 : day - 1));
  return dt;
}

function calNav(days) { calWeekStart.setDate(calWeekStart.getDate() + days); renderCalendar(); }
function calGoToday() { calWeekStart = mondayOfWeek(new Date()); renderCalendar(); }

function renderCalendar() {
  const grid = document.getElementById('cal-grid');
  const rangeEl = document.getElementById('cal-range');
  if (!grid) return;

  const today = new Date(); today.setHours(0, 0, 0, 0);
  const days = Array.from({length: 7}, (_, i) => {
    const d = new Date(calWeekStart); d.setDate(calWeekStart.getDate() + i); return d;
  });

  const DAY_SK = ['Po', 'Ut', 'St', 'Šv', 'Pi', 'So', 'Ne'];
  rangeEl.textContent = `${days[0].toLocaleDateString('sk-SK', {day:'2-digit', month:'long'})} – ${days[6].toLocaleDateString('sk-SK', {day:'2-digit', month:'long', year:'numeric'})}`;

  grid.innerHTML = days.map((d, i) => {
    const isToday = d.getTime() === today.getTime();
    const nextDay = new Date(d); nextDay.setDate(d.getDate() + 1);
    const dayLeads = leads.filter(l => {
      if (!l.followup_date) return false;
      const fd = new Date(l.followup_date); fd.setHours(0, 0, 0, 0);
      return fd.getTime() === d.getTime();
    }).sort((a, b) => new Date(a.followup_date) - new Date(b.followup_date));

    const events = dayLeads.map(l => {
      if (!passesFilters(l)) return '';
      const s = STAGES[l.stage || 'new'] || STAGES.new;
      const name = strip(l.url);
      const contact = (l.overrides || {}).contact_name || l.data?.primary_contact?.name || '';
      const time = new Date(l.followup_date).toLocaleTimeString('sk-SK', {hour:'2-digit', minute:'2-digit'});
      const u = esc(l.url);
      return `<div class="cal-event" style="border-left-color:${s.color}" data-url="${u}" onclick="openDrawer(this.dataset.url)">
        <div class="cal-event-name">${esc(name)}</div>
        ${contact ? `<div class="cal-event-contact">${esc(contact)}</div>` : ''}
        <div class="cal-event-note">${time}${l.followup_note ? ' · ' + esc(l.followup_note.slice(0, 20)) : ''}</div>
      </div>`;
    }).join('');

    return `<div class="cal-day${isToday ? ' today' : ''}">
      <div class="cal-day-hdr">${DAY_SK[i]}<br>${d.toLocaleDateString('sk-SK', {day:'2-digit', month:'2-digit'})}</div>
      <div class="cal-day-body">${events || ''}</div>
    </div>`;
  }).join('');
}

// ── TOAST ──
function toast(msg, type = 'info', sub = '') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<div class="toast-msg">${esc(msg)}</div>${sub ? `<div class="toast-sub">${esc(sub)}</div>` : ''}`;
  document.getElementById('toast-container').appendChild(el);
  requestAnimationFrame(() => { requestAnimationFrame(() => el.classList.add('vis')); });
  setTimeout(() => {
    el.classList.remove('vis');
    setTimeout(() => el.remove(), 200);
  }, 3000);
}

// ── SCRAPE ──
async function scrape(url) {
  if (isScraping) return;
  url = url.trim();
  if (!url) return;
  isScraping = true;
  setScrapeLoading(true);
  const t0 = Date.now();
  const status = document.getElementById('scrape-status');
  let elapsed = 0;
  const timer = setInterval(() => { elapsed = Math.floor((Date.now() - t0) / 1000); status.textContent = `Scrapujem... (${elapsed}s)`; }, 1000);
  try {
    const data = await apiScrape(url);
    clearInterval(timer);
    upsertLead(data);
    render();
    updateTodayWidget();
    const tier = data.tier || '';
    const score = data.score ?? '?';
    toast(`${strip(url)} — ${tier} (${score})`, 'success');
    if (openUrl === data.url) renderDrawer(data.url);
  } catch (e) {
    clearInterval(timer);
    toast(`Scrape zlyhal: ${e.message}`, 'error');
  } finally {
    isScraping = false;
    setScrapeLoading(false);
    status.textContent = '';
  }
}

function setScrapeLoading(on) {
  const btn = document.getElementById('scrape-btn');
  const icon = document.getElementById('scrape-icon');
  const txt = document.getElementById('scrape-txt');
  const input = document.getElementById('url-input');
  btn.disabled = on;
  input.disabled = on;
  icon.innerHTML = on ? ic.spinner : '→';
  txt.textContent = on ? 'Scrapujem' : 'Scrape';
}

// ── CSV ──
function parseCsv(text) {
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  const urls = [];
  lines.forEach((line, i) => {
    const first = line.split(',')[0].replace(/^["']|["']$/g, '').trim();
    if (!first) return;
    if (i === 0 && first.toLowerCase() === 'url') return;
    if (first.includes('.')) urls.push(first);
  });
  return urls;
}

function showCsvModal(urls) {
  csvUrls = urls;
  csvAborted = false;
  const modal = document.getElementById('csv-modal');
  document.getElementById('csv-modal-title').textContent = `Nájdených ${urls.length} URL`;
  document.getElementById('csv-modal-sub').textContent = `Scrape všetky sekvenčne? Každý URL zaberá 10–30 sekúnd.`;
  document.getElementById('csv-prog-wrap').style.display = 'none';
  document.getElementById('csv-prog-text').textContent = '';
  document.getElementById('csv-start-btn').disabled = false;
  document.getElementById('csv-start-btn').textContent = 'Spustiť';
  document.getElementById('csv-cancel-btn').textContent = 'Zrušiť';
  modal.style.display = 'flex';
}

document.getElementById('csv-start-btn').addEventListener('click', startCsvScrape);
document.getElementById('csv-cancel-btn').addEventListener('click', () => {
  csvAborted = true;
  document.getElementById('csv-modal').style.display = 'none';
});

async function startCsvScrape() {
  if (!csvUrls.length) return;
  const total = csvUrls.length;
  let done = 0, errors = [];
  document.getElementById('csv-start-btn').disabled = true;
  document.getElementById('csv-prog-wrap').style.display = 'block';
  document.getElementById('csv-modal-sub').textContent = '';

  for (const url of csvUrls) {
    if (csvAborted) break;
    document.getElementById('csv-prog-text').textContent = `Scrapujem ${done + 1}/${total} — ${strip(url)}`;
    document.getElementById('csv-prog-bar').style.width = `${Math.round((done / total) * 100)}%`;
    try {
      const data = await apiScrape(url);
      upsertLead(data);
      render();
    } catch (e) {
      errors.push(url);
    }
    done++;
  }

  document.getElementById('csv-prog-bar').style.width = '100%';
  document.getElementById('csv-modal').style.display = 'none';
  const ok = done - errors.length;
  toast(`Hotovo. ${ok} úspešných${errors.length ? `, ${errors.length} chýb` : ''}.`, errors.length ? 'info' : 'success');
}

async function searchProfesia(keyword) {
  if (isScraping) return;
  isScraping = true;
  setScrapeLoading(true);
  const status = document.getElementById('scrape-status');

  if (autoScrapeEnabled) {
    status.textContent = 'Scrapujem Profesia.sk (auto)…';
    try {
      const resp = await fetch(`${API}/api/leads/source/auto`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': TOKEN },
        body: JSON.stringify({ channel: 'profesia', keyword, max_results: 20 })
      });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      let added = 0;
      (data.leads || []).forEach(lead => { if (lead.url) { upsertLead(lead); added++; } });
      render();
      toast(`${added} leadov z ${data.found_companies || 0} firiem (${data.skipped?.length || 0} preskočených)`, 'success');
    } catch (e) {
      toast(`Profesia.sk auto chyba: ${e.message}`, 'error');
    } finally {
      isScraping = false;
      setScrapeLoading(false);
      status.textContent = '';
    }
    return;
  }

  status.textContent = 'Hľadám na Profesia.sk...';
  try {
    const resp = await fetch(`${API}/api/leads/source/profesia`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': TOKEN },
      body: JSON.stringify({ keyword, max_results: 20 })
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    showSrcResults(data.results || [], 'profesia', data.total_found || 0, `Profesia.sk — "${keyword}"`);
  } catch (e) {
    toast(`Profesia.sk chyba: ${e.message}`, 'error');
  } finally {
    isScraping = false;
    setScrapeLoading(false);
    status.textContent = '';
  }
}

      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': TOKEN },
      body: JSON.stringify({ category_url: categoryUrl, max_results: 50 })
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    showSrcResults(data.results || [], 'heureka', data.total_found || 0, `Heureka.sk — ${data.category || categoryUrl}`);
  } catch (e) {
    toast(`Heureka.sk chyba: ${e.message}`, 'error');
  } finally {
    isScraping = false;
    setScrapeLoading(false);
    document.getElementById('scrape-status').textContent = '';
  }
}

async function searchEshops(category) {
  if (!category) { toast('Zadaj kategóriu e-shopov', 'error'); return; }
  if (isScraping) return;
  isScraping = true;
  setScrapeLoading(true);
  document.getElementById('scrape-status').textContent = 'Hľadám e-shopy...';
  try {
    const resp = await fetch(`${API}/api/leads/source/eshops`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': TOKEN },
      body: JSON.stringify({ category, max_results: 50, sources: ['pricemania', 'ecommerce_sk'] })
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    const mapped = (data.results || []).map(r => ({ ...r, company_name: r.shop_name, company_url: r.shop_url }));
    showSrcResults(mapped, 'eshops', data.total_found || 0, `E-shopy — "${category}"`);
    if (data.notes?.length) toast(data.notes.join(' | '), 'info');
  } catch (e) {
    toast(`E-shopy chyba: ${e.message}`, 'error');
  } finally {
    isScraping = false;
    setScrapeLoading(false);
    document.getElementById('scrape-status').textContent = '';
  }
}

async function searchOrsrNew(region) {
  if (isScraping) return;
  isScraping = true;
  setScrapeLoading(true);
  document.getElementById('scrape-status').textContent = 'Hľadám nové firmy...';
  try {
    const resp = await fetch(`${API}/api/leads/source/orsr_new`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': TOKEN },
      body: JSON.stringify({ days_back: 90, region: region || null, max_results: 30 })
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    if (data.status === 'not_implemented') {
      toast(`Nové firmy: ${data.message}`, 'info');
      return;
    }
    showSrcResults(data.results || [], 'orsr_new', data.total_found || 0, `Nové firmy — posledných 90 dní`);
  } catch (e) {
    toast(`ORSR chyba: ${e.message}`, 'error');
  } finally {
    isScraping = false;
    setScrapeLoading(false);
    document.getElementById('scrape-status').textContent = '';
  }
}

async function searchMaps(query) {
  if (!query) { toast('Zadaj odbor | mesto', 'error'); return; }
  if (isScraping) return;
  isScraping = true;
  setScrapeLoading(true);
  document.getElementById('scrape-status').textContent = 'Hľadám na Google Maps...';
  const parts = query.split('|').map(s => s.trim());
  const keyword = parts[0] || query;
  const location = parts[1] || '';
  try {
    const resp = await fetch(`${API}/api/leads/source/maps`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': TOKEN },
      body: JSON.stringify({ keyword, location, max_results: 20 })
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.detail || `HTTP ${resp.status}`);
    }
    const data = await resp.json();
    showSrcResults(data.results || [], 'maps', data.total_found || 0, `Google Maps — "${keyword}" ${location}`);
  } catch (e) {
    toast(`Google Maps: ${e.message}`, 'error');
  } finally {
    isScraping = false;
    setScrapeLoading(false);
    document.getElementById('scrape-status').textContent = '';
  }
}

function showSrcResults(results, source, totalFound, title) {
  srcResults = results;
  document.getElementById('src-modal-title').textContent = title;
  document.getElementById('src-modal-sub').textContent = `Nájdených: ${totalFound}, zobrazených: ${results.length}`;
  document.getElementById('src-list').innerHTML = results.map((r, i) => {
    const name = esc(r.company_name || r.shop_name || '—');
    const url = r.company_url || r.shop_url || '';
    const isAgency = r.url_confidence === 'agency';
    const meta = source === 'profesia'
      ? [r.job_title, r.location].filter(Boolean).join(' · ')
      : r.rating ? `Hodnotenie: ${r.rating}` : '';
    return `<div class="src-item${isAgency ? ' agency' : ''}">
      <input type="checkbox" id="src-cb-${i}" ${isAgency ? '' : 'checked'} ${!url ? 'disabled' : ''} onchange="updateSrcCount()">
      <label for="src-cb-${i}" class="src-item-info" style="cursor:pointer">
        <div class="src-item-name">${name}</div>
        ${url ? `<div class="src-item-url">${esc(url)}</div>` : `<div class="src-item-warn">${icon('alert', 10, 2)} URL neznáme — nebude scrapované</div>`}
        ${meta ? `<div class="src-item-meta">${esc(meta)}</div>` : ''}
        ${isAgency ? `<div class="src-item-meta" style="color:var(--tier-dead)">Personálna agentúra</div>` : ''}
      </label>
    </div>`;
  }).join('');
  updateSrcCount();
  document.getElementById('src-modal').style.display = 'flex';
  if (autoScrapeEnabled) {
    setTimeout(() => {
      const urls = srcResults.map(r => r.company_url || r.shop_url || '').filter(Boolean);
      if (urls.length) {
        document.getElementById('src-modal').style.display = 'none';
        showCsvModal(urls);
        setTimeout(() => document.getElementById('csv-start-btn').click(), 80);
      }
    }, 50);
  }
}

function updateSrcCount() {
  const validUrls = [...document.querySelectorAll('#src-list input[type="checkbox"]:checked')].map(cb => {
    const i = parseInt(cb.id.replace('src-cb-', ''));
    const r = srcResults[i];
    return r?.company_url || r?.shop_url || '';
  }).filter(Boolean);
  document.getElementById('src-scrape-btn').textContent = `Scrapovať vybrané (${validUrls.length})`;
  document.getElementById('src-select-count').textContent = `${validUrls.length} s URL`;
}

function closeSrcModal() {
  document.getElementById('src-modal').style.display = 'none';
}

function scrapeSelected() {
  const urls = [...document.querySelectorAll('#src-list input[type="checkbox"]:checked')].map(cb => {
    const i = parseInt(cb.id.replace('src-cb-', ''));
    const r = srcResults[i];
    return r?.company_url || r?.shop_url || '';
  }).filter(Boolean);
  if (!urls.length) { toast('Žiadne URL na scrapovanie', 'error'); return; }
  closeSrcModal();
  showCsvModal(urls);
}

// ── EVENTS ──
document.getElementById('scrape-btn').addEventListener('click', onScrapeClick);
document.getElementById('auto-scrape-cb').addEventListener('change', e => {
  autoScrapeEnabled = e.target.checked;
});
document.getElementById('url-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') onScrapeClick();
});
document.getElementById('csv-btn').addEventListener('click', () => {
  document.getElementById('csv-file').click();
});
document.getElementById('csv-file').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const urls = parseCsv(ev.target.result);
    if (!urls.length) { toast('Žiadne URL v súbore', 'error'); return; }
    scrapeChannel = 'csv';
    showCsvModal(urls);
  };
  reader.readAsText(file);
  e.target.value = '';
});

document.querySelector('.col-score.sortable')?.addEventListener('click', () => {
  sortDir = sortDir === 'desc' ? 'asc' : 'desc';
  document.getElementById('sort-ind').textContent = sortDir === 'desc' ? '↓' : '↑';
  render();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeDrawer(); closeDd(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('url-input').focus();
    document.getElementById('url-input').select();
  }
});

document.querySelector('#vbtn-table .vb-ic').innerHTML = icon('listView', 12, 2);
document.querySelector('#vbtn-kanban .vb-ic').innerHTML = icon('kanbanView', 12, 2);
document.querySelector('#vbtn-calendar .vb-ic').innerHTML = icon('calendar', 12, 2);
document.querySelector('#vbtn-trash .vb-ic').innerHTML = icon('trash', 12, 2);
runImportBatch2();
loadLeads();
render();
updateTodayWidget();
</script>
