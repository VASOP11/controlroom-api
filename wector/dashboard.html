<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wector — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0A0A0F;
  --bg-surface: #111118;
  --bg-surface-hover: #16161F;
  --bg-elevated: #1A1A24;
  --border: #1E1E2E;
  --border-subtle: #15151F;
  --text-primary: #F1F5F9;
  --text-secondary: #A0AEC0;
  --text-muted: #4A5568;
  --accent-blue: #4F6EF7;
  --accent-blue-hover: #6380FF;
  --tier-hot: #22C55E;
  --tier-warm: #F59E0B;
  --tier-cool: #6B7280;
  --tier-dead: #EF4444;
  --font-sans: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'Menlo', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { background: var(--bg-primary); color: var(--text-primary); font-family: var(--font-sans); font-size: 14px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
button { cursor: pointer; border: none; background: none; font-family: inherit; font-size: inherit; color: inherit; }
input, textarea, select { font-family: inherit; font-size: inherit; }
a { color: inherit; text-decoration: none; }

/* ── TOP BAR ── */
#topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg-primary);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
}
.topbar-row1 {
  display: flex; align-items: center; gap: 16px; height: 60px;
}
.topbar-brand {
  font-family: var(--font-mono); font-size: 15px; font-weight: 500;
  letter-spacing: 0.14em; color: var(--accent-blue); text-transform: uppercase;
  flex-shrink: 0; user-select: none;
}
.topbar-input-wrap {
  flex: 1; max-width: 580px; display: flex; align-items: center; gap: 8px;
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 0 8px 0 12px;
  transition: border-color 150ms;
}
.topbar-input-wrap:focus-within { border-color: var(--accent-blue); }
.topbar-input-wrap svg { color: var(--text-muted); flex-shrink: 0; }
#url-input {
  flex: 1; height: 40px; background: transparent; border: none; outline: none;
  color: var(--text-primary); font-size: 14px;
}
#url-input::placeholder { color: var(--text-muted); }
#url-input:disabled { opacity: 0.5; }
#scrape-btn {
  height: 32px; padding: 0 14px; background: var(--accent-blue); color: #fff;
  border-radius: 5px; font-size: 13px; font-weight: 600;
  display: inline-flex; align-items: center; gap: 6px;
  transition: background 150ms; flex-shrink: 0;
}
#scrape-btn:hover:not(:disabled) { background: var(--accent-blue-hover); }
#scrape-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.topbar-user { font-size: 12px; color: var(--text-muted); flex-shrink: 0; margin-left: auto; }
.topbar-row2 {
  padding: 0 0 10px 0;
  display: flex; align-items: center; gap: 12px;
}
#csv-btn {
  font-size: 12px; color: var(--text-muted);
  display: inline-flex; align-items: center; gap: 4px;
  transition: color 150ms;
}
#csv-btn:hover { color: var(--text-secondary); }
#scrape-status {
  font-size: 12px; color: var(--text-muted); font-family: var(--font-mono);
}

/* ── FILTER BAR ── */
#filter-bar {
  padding: 10px 24px;
  display: flex; align-items: center; gap: 4px;
  border-bottom: 1px solid var(--border-subtle);
  overflow-x: auto;
  -ms-overflow-style: none; scrollbar-width: none;
}
#filter-bar::-webkit-scrollbar { display: none; }
.filter-btn {
  height: 28px; padding: 0 10px; border-radius: 5px;
  font-size: 12px; font-weight: 500; color: var(--text-muted);
  border: 1px solid transparent; white-space: nowrap;
  display: inline-flex; align-items: center; gap: 5px;
  transition: all 120ms;
}
.filter-btn:hover { background: var(--bg-surface-hover); color: var(--text-secondary); }
.filter-btn.active {
  background: var(--bg-surface); border-color: var(--border);
  color: var(--text-primary);
}
.filter-count {
  font-family: var(--font-mono); font-size: 10px;
  background: var(--bg-elevated); color: var(--text-muted);
  padding: 0 5px; border-radius: 3px; min-width: 16px; text-align: center;
}

/* ── MAIN ── */
#main { padding: 0 24px 80px; }

/* ── TABLE ── */
.leads-table { width: 100%; border-collapse: collapse; margin-top: 4px; }
.leads-table thead th {
  text-align: left; padding: 8px 12px;
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  white-space: nowrap; user-select: none;
}
.leads-table thead th.sortable { cursor: pointer; }
.leads-table thead th.sortable:hover { color: var(--text-secondary); }
.leads-table tbody tr {
  border-bottom: 1px solid var(--border-subtle);
  cursor: pointer; transition: background 100ms;
}
.leads-table tbody tr:hover { background: var(--bg-surface-hover); }
.leads-table tbody td { padding: 10px 12px; vertical-align: middle; }

.col-tier { width: 72px; }
.col-firma { min-width: 140px; }
.col-kontakt { width: 155px; }
.col-telefon { width: 135px; }
.col-score { width: 64px; }
.col-status { width: 108px; }

.tier-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: var(--font-mono); font-size: 11px; font-weight: 500;
}
.tier-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.t-HOT { color: var(--tier-hot); }
.t-HOT .tier-dot { background: var(--tier-hot); }
.t-WARM { color: var(--tier-warm); }
.t-WARM .tier-dot { background: var(--tier-warm); }
.t-COOL { color: var(--tier-cool); }
.t-COOL .tier-dot { background: var(--tier-cool); }
.t-DEAD { color: var(--tier-dead); }
.t-DEAD .tier-dot { background: var(--tier-dead); }

.firma-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
.firma-url { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); margin-top: 1px; }

.score-val { font-family: var(--font-mono); font-weight: 500; font-size: 14px; }

.phone-link { font-family: var(--font-mono); font-size: 12px; color: var(--text-secondary); transition: color 120ms; }
.phone-link:hover { color: var(--accent-blue); }

.status-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500;
  cursor: pointer; white-space: nowrap;
}
.s-new { color: var(--text-muted); background: var(--bg-surface); }
.s-called { color: var(--tier-warm); background: rgba(245,158,11,0.09); }
.s-confirmed { color: var(--tier-hot); background: rgba(34,197,94,0.09); }
.s-rejected { color: var(--tier-dead); background: rgba(239,68,68,0.09); }

.status-dropdown {
  position: fixed; z-index: 999;
  background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: 6px; padding: 4px; min-width: 150px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.6);
}
.status-dropdown button {
  display: block; width: 100%; text-align: left;
  padding: 6px 10px; font-size: 12px; color: var(--text-secondary);
  border-radius: 4px; transition: background 100ms;
}
.status-dropdown button:hover { background: var(--bg-surface-hover); color: var(--text-primary); }

/* ── EMPTY STATE ── */
#empty-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 320px; color: var(--text-muted);
  text-align: center; gap: 10px;
}
#empty-state svg { opacity: 0.25; }
#empty-state p { font-size: 13px; max-width: 260px; line-height: 1.5; }

/* ── DRAWER ── */
#drawer-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.55);
  z-index: 200; opacity: 0; pointer-events: none;
  transition: opacity 200ms;
}
#drawer-overlay.vis { opacity: 1; pointer-events: all; }

#drawer {
  position: fixed; top: 0; right: 0; bottom: 0; width: 420px;
  background: var(--bg-surface); border-left: 1px solid var(--border);
  z-index: 201; transform: translateX(100%);
  transition: transform 300ms cubic-bezier(0.4, 0, 0.2, 1);
  overflow-y: auto; display: flex; flex-direction: column;
}
#drawer.open { transform: translateX(0); }
#drawer-content { flex: 1; padding: 20px; }

.d-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
.d-title { font-size: 15px; font-weight: 600; }
.d-subtitle { font-size: 11px; color: var(--text-secondary); font-family: var(--font-mono); margin-top: 2px; }
.d-close {
  width: 28px; height: 28px; border-radius: 5px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted); transition: background 100ms, color 100ms;
}
.d-close:hover { background: var(--bg-elevated); color: var(--text-primary); }

.d-divider { height: 1px; background: var(--border); margin: 14px 0; }

.d-score-row {
  display: flex; align-items: baseline; gap: 10px; margin-bottom: 2px;
}
.d-score-num { font-family: var(--font-mono); font-size: 30px; font-weight: 500; }
.d-score-denom { font-family: var(--font-mono); font-size: 14px; color: var(--text-muted); }

.d-label {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 8px;
}

.d-card {
  background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: 6px; padding: 12px; margin-bottom: 10px;
}
.d-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 8px; flex-wrap: wrap;
}
.d-row:last-child { margin-bottom: 0; }
.d-row svg { color: var(--text-muted); flex-shrink: 0; }
.d-name { font-size: 14px; font-weight: 600; }
.d-phone { font-family: var(--font-mono); font-size: 13px; }
.d-meta { font-size: 11px; color: var(--text-muted); margin-top: 6px; line-height: 1.5; }

.icon-btn {
  height: 26px; padding: 0 8px; border-radius: 4px;
  background: var(--bg-surface); border: 1px solid var(--border);
  color: var(--text-muted); font-size: 11px;
  display: inline-flex; align-items: center; gap: 4px;
  transition: all 100ms; white-space: nowrap;
}
.icon-btn:hover { color: var(--text-primary); background: var(--bg-surface-hover); }
.icon-btn svg { width: 12px; height: 12px; }

.d-reg-row {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; color: var(--text-secondary); margin-bottom: 5px;
}
.d-reg-row svg { width: 13px; height: 13px; color: var(--tier-hot); flex-shrink: 0; }
.d-reg-row.unv svg { color: var(--text-muted); }

.reasoning-box {
  background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: 6px; padding: 12px;
  font-family: var(--font-mono); font-size: 11px;
  color: var(--text-secondary); line-height: 1.7;
  white-space: pre-wrap; word-break: break-word;
}

.other-ct {
  font-size: 12px; color: var(--text-secondary);
  padding: 6px 0; border-bottom: 1px solid var(--border-subtle);
  display: flex; gap: 6px; flex-wrap: wrap;
}
.other-ct:last-child { border-bottom: none; }
.other-ct .mono { font-family: var(--font-mono); font-size: 11px; }

.action-btn {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 9px 12px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--bg-elevated);
  color: var(--text-secondary); font-size: 13px; text-align: left;
  transition: all 150ms; margin-bottom: 6px;
}
.action-btn:hover:not(:disabled) { background: var(--bg-surface-hover); color: var(--text-primary); }
.action-btn.done { color: var(--tier-hot); border-color: rgba(34,197,94,0.25); background: rgba(34,197,94,0.05); cursor: default; }
.action-btn.done svg { color: var(--tier-hot); }
.action-btn:last-child { margin-bottom: 0; }

#drawer-notes {
  width: 100%; min-height: 80px;
  background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: 6px; padding: 10px 12px;
  color: var(--text-primary); font-size: 13px; resize: vertical; outline: none;
  transition: border-color 150ms; line-height: 1.5;
}
#drawer-notes:focus { border-color: var(--accent-blue); }
#save-notes-btn {
  margin-top: 8px; padding: 7px 14px;
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: 5px; font-size: 12px; color: var(--text-secondary);
  transition: all 150ms;
}
#save-notes-btn:hover { background: var(--bg-surface-hover); color: var(--text-primary); }

/* ── TOASTS ── */
#toast-container {
  position: fixed; bottom: 24px; right: 24px; z-index: 500;
  display: flex; flex-direction: column; gap: 8px; pointer-events: none;
}
.toast {
  background: var(--bg-elevated); border: 1px solid var(--border);
  border-left-width: 3px; border-radius: 6px; padding: 11px 14px;
  font-size: 13px; min-width: 260px; max-width: 340px;
  pointer-events: all; opacity: 0; transform: translateX(16px);
  transition: opacity 180ms, transform 180ms;
}
.toast.vis { opacity: 1; transform: translateX(0); }
.toast.success { border-left-color: var(--tier-hot); }
.toast.error { border-left-color: var(--tier-dead); }
.toast.info { border-left-color: var(--accent-blue); }
.toast-msg { color: var(--text-primary); }
.toast-sub { color: var(--text-muted); font-size: 12px; margin-top: 2px; }

/* ── CSV MODAL ── */
#csv-modal {
  position: fixed; inset: 0; z-index: 600;
  background: rgba(0,0,0,0.72);
  display: flex; align-items: center; justify-content: center;
}
.csv-inner {
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 24px; width: 460px; max-width: 90vw;
}
.csv-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.csv-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; line-height: 1.5; }
.progress-wrap { background: var(--bg-elevated); border-radius: 3px; height: 4px; overflow: hidden; margin: 10px 0; }
.progress-bar { height: 100%; background: var(--accent-blue); border-radius: 3px; transition: width 200ms; }
.progress-text { font-size: 12px; color: var(--text-secondary); font-family: var(--font-mono); }
.csv-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
.btn-primary {
  padding: 8px 16px; background: var(--accent-blue); color: #fff;
  border-radius: 5px; font-size: 13px; font-weight: 600; transition: background 150ms;
}
.btn-primary:hover:not(:disabled) { background: var(--accent-blue-hover); }
.btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }
.btn-sec {
  padding: 8px 16px; background: var(--bg-elevated); color: var(--text-secondary);
  border: 1px solid var(--border); border-radius: 5px; font-size: 13px; transition: all 150ms;
}
.btn-sec:hover { color: var(--text-primary); }

/* ── SPINNER ── */
@keyframes spin { to { transform: rotate(360deg); } }
.spin { animation: spin 700ms linear infinite; display: inline-flex; }

/* ── SOURCE TABS ── */
.source-tabs { display: flex; gap: 2px; }
.src-tab {
  height: 26px; padding: 0 10px; border-radius: 4px;
  font-size: 12px; font-weight: 500; color: var(--text-muted);
  transition: color 100ms, background 100ms;
}
.src-tab:hover { color: var(--text-secondary); }
.src-tab.active { color: var(--text-primary); background: var(--bg-elevated); border: 1px solid var(--border); }

/* ── SOURCE RESULTS MODAL ── */
#src-modal {
  position: fixed; inset: 0; z-index: 600;
  background: rgba(0,0,0,0.72);
  display: flex; align-items: center; justify-content: center;
}
.src-inner {
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 24px; width: 520px; max-width: 90vw;
  max-height: 80vh; display: flex; flex-direction: column;
}
.src-list { overflow-y: auto; flex: 1; margin: 12px 0; max-height: 360px; }
.src-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid var(--border-subtle);
}
.src-item:last-child { border-bottom: none; }
.src-item.agency { opacity: 0.4; }
.src-item-info { flex: 1; min-width: 0; }
.src-item-name { font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.src-item-url { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); margin-top: 2px; }
.src-item-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.src-item-warn { font-size: 11px; color: var(--tier-warm); margin-top: 2px; }
.src-item input[type="checkbox"] { width: 14px; height: 14px; accent-color: var(--accent-blue); flex-shrink: 0; margin-top: 2px; cursor: pointer; }
#src-select-count { font-size: 13px; color: var(--text-muted); }

/* ── RESPONSIVE ── */
@media (max-width: 1024px) { #drawer { width: 100%; } }
@media (max-width: 768px) {
  #topbar, #filter-bar, #main { padding-left: 14px; padding-right: 14px; }
  .topbar-row2 { padding-left: 0; }
  .col-score { display: none; }
  .col-kontakt { display: none; }
  #drawer { width: 100%; }
}

/* ── VIEW TOGGLE ── */
.view-toggle { display: flex; gap: 2px; margin-left: auto; flex-shrink: 0; }
.view-btn {
  height: 26px; padding: 0 10px; border-radius: 4px;
  font-size: 12px; font-weight: 500; color: var(--text-muted);
  transition: all 100ms; border: 1px solid transparent;
}
.view-btn:hover { color: var(--text-secondary); }
.view-btn.active { color: var(--text-primary); background: var(--bg-elevated); border-color: var(--border); }

/* ── KANBAN ── */
#view-kanban { display: none; padding: 8px 0 80px; overflow-x: auto; }
.kanban-board {
  display: flex; gap: 10px; align-items: flex-start;
  min-width: max-content; padding: 4px 24px 8px;
}
.kanban-col {
  width: 210px; flex-shrink: 0; border-radius: 6px;
  background: var(--bg-surface); border: 1px solid var(--border);
  display: flex; flex-direction: column; min-height: 200px;
}
.kanban-col.drag-over { border-color: var(--accent-blue); background: rgba(79,110,247,0.05); }
.kanban-col-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.kanban-col-title { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
.kanban-col-count {
  font-family: var(--font-mono); font-size: 10px; background: var(--bg-elevated);
  color: var(--text-muted); padding: 0 5px; border-radius: 3px; min-width: 18px; text-align: center;
}
.kanban-col-body { padding: 6px; flex: 1; display: flex; flex-direction: column; gap: 5px; }
.kanban-card {
  background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: 5px; padding: 8px 9px; cursor: pointer; transition: border-color 120ms;
  user-select: none;
}
.kanban-card:hover { border-color: var(--text-muted); }
.kanban-card.dragging { opacity: 0.4; }
.kc-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.kc-name { font-size: 12px; font-weight: 500; color: var(--text-primary); margin-bottom: 2px; line-height: 1.3; word-break: break-all; }
.kc-contact { font-size: 11px; color: var(--text-secondary); margin-bottom: 1px; }
.kc-phone { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
.kc-followup { font-size: 10px; margin-top: 4px; padding: 1px 5px; border-radius: 3px; display: inline-block; }
.kc-followup.today { background: rgba(245,158,11,0.15); color: var(--tier-warm); }
.kc-followup.overdue { background: rgba(239,68,68,0.12); color: var(--tier-dead); }
.kc-followup.future { color: var(--text-muted); }

/* ── STAGE PILLS ── */
.stage-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 500;
  white-space: nowrap; cursor: pointer; user-select: none;
}
.stage-selector {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; margin-bottom: 10px;
}
.stage-sel-btn {
  padding: 5px 2px; border-radius: 4px; font-size: 10px; line-height: 1.4;
  border: 1px solid var(--border); background: var(--bg-elevated);
  color: var(--text-muted); text-align: center; cursor: pointer;
  transition: all 100ms; white-space: nowrap;
}
.stage-sel-btn:hover { color: var(--text-secondary); background: var(--bg-surface-hover); }
.stage-sel-btn.s-active { font-weight: 600; }

/* ── MANUAL BADGE + EDIT PENCIL ── */
.manual-badge {
  font-size: 10px; color: var(--tier-warm); background: rgba(245,158,11,0.1);
  border: 1px solid rgba(245,158,11,0.25); border-radius: 3px; padding: 1px 5px;
  flex-shrink: 0;
}
.edit-pencil {
  opacity: 0; height: 20px; padding: 0 5px; border-radius: 3px; flex-shrink: 0;

}

}

/* ── MULTI-NOTES ── */
.notes-list { margin-bottom: 8px; max-height: 220px; overflow-y: auto; }
.note-item {

}

.note-del {

}
.note-item:hover .note-del { opacity: 1; }
.note-del:hover { color: var(--tier-dead); }
.note-add-wrap { display: flex; gap: 6px; align-items: flex-end; }
.note-add-input {
  flex: 1; background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: 5px; padding: 7px 10px; color: var(--text-primary); font-size: 13px;
  resize: none; outline: none; min-height: 36px; max-height: 100px;
  transition: border-color 150ms; line-height: 1.4; overflow-y: auto;

.note-add-input:focus { border-color: var(--accent-blue); }
.note-add-btn {

  border: 1px solid var(--border); border-radius: 5px; font-size: 12px;
  color: var(--text-secondary); transition: all 150ms; flex-shrink: 0;
}
.note-add-btn:hover { color: var(--text-primary); background: var(--bg-surface-hover); }
</style>
</head>

<script>
'use strict';
const API = 'http://localhost:8000';
const TOKEN = 'Bearer test-token';
const STORAGE_KEY = 'wector_leads_v3';
const MAX_LEADS = 500;

// ── PIPELINE STAGES ──
const STAGES = {
  new:        {label:'Nový',            emoji:'🆕', short:'Nový',    color:'#64748B'},
  called_no:  {label:'Volaný—bez odp.',emoji:'📞', short:'Volaný',  color:'#D97706'},
  contacted:  {label:'Kontaktovaný',    emoji:'💬', short:'Kontak.', color:'#2563EB'},
  interested: {label:'Záujem',          emoji:'👋', short:'Záujem',  color:'#7C3AED'},
  meeting:    {label:'Stretnutie',      emoji:'📅', short:'Stret.',  color:'#0891B2'},
  offer:      {label:'Ponuka',          emoji:'✉️', short:'Ponuka',  color:'#6366F1'},
  converted:  {label:'Konvertovaný',    emoji:'✅', short:'Konv.',   color:'#16A34A'},
  rejected:   {label:'Odmietnutý',      emoji:'❌', short:'Odmiet.', color:'#DC2626'},
  snoozed:    {label:'Odložený',        emoji:'💤', short:'Odlož.',  color:'#6B7280'},
  lost:       {label:'Stratený',        emoji:'☠️', short:'Strat.', color:'#374151'},
};
const STAGE_ORDER = ['new','called_no','contacted','interested','meeting','offer','converted','rejected','snoozed','lost'];

// ── STATE ──
let leads = [];
let filter = 'all';
let sortField = 'score';
let sortDir = 'desc';
let openUrl = null;
let isScraping = false;
let csvUrls = [];
let csvAborted = false;
let activeDd = null;
let activeSource = 'url';
let srcResults = [];
let autoScrapeEnabled = true;
let currentView = 'table';
let draggedUrl = null;

// ── SVG ──
const ic = {
  x: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>`,
  phone: `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.72 14a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.63 3h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 10.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 17z"/></svg>`,
  mail: `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>`,
  copy: `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>`,
  check: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>`,
  xcirc: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>`,
  clock: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
  minus: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/></svg>`,
  shield: `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></svg>`,
  user: `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
  ext: `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 0-2-2V8a2 2 0 0 1 2-2h6"/></svg>`,
  spinner: `<svg class="spin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>`,
  chevD: `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>`,
};

// ── HELPERS ──
function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function strip(url) {
  return (url || '').replace(/^https?:\/\//, '').replace(/\/$/, '');
}
function telHref(phone) {
  if (!phone) return '#';
  const d = phone.replace(/\s/g, '');
  if (d.startsWith('+') || d.startsWith('00')) return `tel:${d}`;
  if (d.startsWith('0') && d.length === 10) return `tel:+421${d.slice(1)}`;
  return `tel:${d}`;
}
function formatPhone(raw) {
  if (!raw) return null;
  const d = raw.replace(/\D/g, '');
  if (d.startsWith('421') && d.length === 12)
    return '+421 ' + d.slice(3,6) + ' ' + d.slice(6,9) + ' ' + d.slice(9);
  if (d.startsWith('420') && d.length === 12)
    return '+420 ' + d.slice(3,6) + ' ' + d.slice(6,9) + ' ' + d.slice(9);
  if (d.startsWith('00421') && d.length === 14)
    return '+421 ' + d.slice(5,8) + ' ' + d.slice(8,11) + ' ' + d.slice(11);
  if (d.length === 10 && d.startsWith('0'))
    return d.slice(0,4) + ' ' + d.slice(4,7) + ' ' + d.slice(7);
  if (d.length === 9)
    return d.slice(0,3) + ' ' + d.slice(3,6) + ' ' + d.slice(6);
  return raw;
}
function fmtPhone(p) { return formatPhone(p) || '—'; }
function velLabel(v) {
  const map = { micro: 'micro (1–5)', small: 'small (6–49)', medium: 'medium (50–249)', large: 'large (250+)' };
  return map[v] || v || '—';
}
function srcLabel(s) {
  const map = { 'register+web': 'Register + web', 'registry': 'Register', 'web': 'Web', 'json-ld': 'JSON-LD', 'whois': 'WHOIS' };
  return map[s] || s || '—';
}
function ptypeLabel(t) {
  const map = { personal: 'osobný', info: 'info', delivery: 'dopravca', fax: 'fax' };
  return map[t] || t || '—';
}
function statusLabel(s) {
  return { new: 'Nový', called: 'Volaný', confirmed: 'Potvrdený', rejected: 'Odmietnutý' }[s] || 'Nový';
}
function statusClass(s) {
  return { new: 's-new', called: 's-called', confirmed: 's-confirmed', rejected: 's-rejected' }[s] || 's-new';
}
function confirmToStatus(ct) {
  if (ct === 'konatel_confirmed' || ct === 'contact_confirmed') return 'confirmed';
  if (ct === 'wrong_contact' || ct === 'not_interested') return 'rejected';
  if (ct === 'no_answer') return 'called';
  return 'new';
}

// ── STORAGE ──
function loadLeads() {
  let raw;
  try { raw = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { raw = []; }
  if (!raw.length) {
    let v2; try { v2 = JSON.parse(localStorage.getItem('wector_leads_v2') || '[]'); } catch { v2 = []; }
    if (v2.length) {
      const stMap = {new:'new', called:'called_no', confirmed:'contacted', rejected:'rejected'};
      raw = v2.map(l => ({
        url: l.url, data: l.data || {},
        stage: stMap[l.status] || 'new',
        followup_date: null, followup_note: '',
        notes: (l.notes && l.notes.trim()) ? [{id: uid(), ts: l.scraped_at || new Date().toISOString(), text: l.notes.trim()}] : [],
        history: [{ts: l.scraped_at || new Date().toISOString(), type: 'scraped', data: ''}],
        overrides: {phone: null, email: null, contact_name: null},
        scraped_at: l.scraped_at || new Date().toISOString()
      }));
      localStorage.setItem(STORAGE_KEY, JSON.stringify(raw));
    }
  }
  leads = raw.filter(l => l.data && l.data.score !== undefined);
  leads.forEach(initDefaults);
}
function saveLeads() {
  if (leads.length > MAX_LEADS) {
    const dead = leads.filter(l => l.data?.tier === 'DEAD').sort((a,b) => new Date(a.scraped_at) - new Date(b.scraped_at));
    const alive = leads.filter(l => l.data?.tier !== 'DEAD');
    leads = [...alive, ...dead].slice(0, MAX_LEADS);
  }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(leads));
}
function upsertLead(data) {
  const url = data.url;
  const idx = leads.findIndex(l => l.url === url);
  const ts = data.scraped_at || new Date().toISOString();
  if (idx >= 0) {
    const ex = leads[idx];
    addHistory(ex, 'scraped', '');
    leads[idx] = {...ex, data, scraped_at: ts};
  } else {
    const nl = {url, data, stage: 'new', followup_date: null, followup_note: '', notes: [], history: [], overrides: {phone: null, email: null, contact_name: null}, scraped_at: ts};
    addHistory(nl, 'scraped', '');
    leads.unshift(nl);
  }
  saveLeads();
}

// ── API ──
async function apiScrape(url) {
  const resp = await fetch(`${API}/api/leads/scrape`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': TOKEN },
    body: JSON.stringify({ url })
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({ detail: resp.statusText }));
    throw new Error(err.detail || `HTTP ${resp.status}`);
  }
  return resp.json();
}
async function apiConfirm(url, confirmation_type, extra = {}) {
  try {
    await fetch(`${API}/api/leads/confirm`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': TOKEN },
      body: JSON.stringify({ url, confirmation_type, ...extra })
    });
  } catch (_) { /* 404 or network — ignore, stored locally */ }
}

// ── RENDER ──
function filteredSorted() {
  let list = filter === 'all' ? [...leads] : leads.filter(l => l.data?.tier === filter);
  list.sort((a, b) => {
    const av = a.data?.[sortField] ?? 0, bv = b.data?.[sortField] ?? 0;
    return sortDir === 'desc' ? bv - av : av - bv;
  });
  return list;
}

function render() {
  updateCounts();
  if (currentView === 'kanban') { renderKanban(); return; }
  const list = filteredSorted();
  const tbody = document.getElementById('leads-tbody');
  const table = document.getElementById('leads-table');
  const empty = document.getElementById('empty-state');
  if (leads.length === 0) { table.style.display = 'none'; empty.style.display = 'flex'; return; }
  table.style.display = 'table'; empty.style.display = 'none';
  tbody.innerHTML = list.map(l => rowHtml(l)).join('');
}

function setView(v) {
  currentView = v;
  document.getElementById('view-kanban').style.display = v === 'kanban' ? 'block' : 'none';
  const tableEl = document.getElementById('leads-table');
  const emptyEl = document.getElementById('empty-state');
  if (v === 'kanban') {
    tableEl.style.display = 'none'; emptyEl.style.display = 'none';
  }
  document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.id === `vbtn-${v}`));
  render();
}

function renderKanban() {
  const board = document.getElementById('kanban-board');
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);

  board.innerHTML = STAGE_ORDER.map(sid => {
    const s = STAGES[sid];
    const colLeads = leads.filter(l => (filter === 'all' || l.data?.tier === filter) && (l.stage || 'new') === sid)
      .sort((a, b) => (b.data?.score ?? 0) - (a.data?.score ?? 0));

    const cards = colLeads.map(l => {
      const d = l.data || {};
      const pc = d.primary_contact || {};
      const ov = l.overrides || {};
      const tier = d.tier || 'DEAD';
      const name = d.company_name || strip(l.url);
      const contact = ov.contact_name || pc.name || '';
      const phone = ov.phone || pc.phone || '';
      const u = esc(l.url);

      let followupBadge = '';
      if (l.followup_date) {
        const fd = new Date(l.followup_date); fd.setHours(0, 0, 0, 0);
        if (fd < today) followupBadge = `<span class="kc-followup overdue">⚠ ${new Date(l.followup_date).toLocaleDateString('sk-SK', {day:'2-digit', month:'2-digit'})}</span>`;
        else if (fd.getTime() === today.getTime()) followupBadge = `<span class="kc-followup today">📅 Dnes</span>`;
        else followupBadge = `<span class="kc-followup future">📅 ${new Date(l.followup_date).toLocaleDateString('sk-SK', {day:'2-digit', month:'2-digit'})}</span>`;
      }

      return `<div class="kanban-card" data-url="${u}" draggable="true"
          onclick="openDrawer(this.dataset.url)"
          ondragstart="kdragStart(event, this.dataset.url)"
          ondragend="kdragEnd(event)">
        <div class="kc-top">
          <span class="tier-badge t-${esc(tier)}" style="font-size:10px"><span class="tier-dot"></span>${esc(tier)}</span>
          <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted)">${d.score ?? '?'}</span>
        </div>
        <div class="kc-name">${esc(name)}</div>
        ${contact ? `<div class="kc-contact">${esc(contact)}</div>` : ''}
        ${phone ? `<div class="kc-phone">${esc(fmtPhone(phone))}</div>` : ''}
        ${followupBadge}
      </div>`;
    }).join('');

    return `<div class="kanban-col" data-stage="${sid}"
        ondragover="kdragOver(event)"
        ondragleave="kdragLeave(event)"
        ondrop="kdrop(event, '${sid}')">
      <div class="kanban-col-hdr">
        <span class="kanban-col-title" style="color:${s.color}">${s.emoji} ${esc(s.label)}</span>
        <span class="kanban-col-count">${colLeads.length}</span>
      </div>
      <div class="kanban-col-body">${cards || '<div style="font-size:11px;color:var(--text-muted);padding:6px 0;text-align:center">–</div>'}</div>
    </div>`;
  }).join('');
}

function kdragStart(e, url) {
  draggedUrl = url;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => e.target.classList.add('dragging'), 0);
}
function kdragEnd(e) { e.target.classList.remove('dragging'); }
function kdragOver(e) {
  e.preventDefault(); e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}
function kdragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function kdrop(e, stageId) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!draggedUrl) return;
  const lead = leads.find(l => l.url === draggedUrl);
  if (lead && lead.stage !== stageId) {
    addHistory(lead, 'stage_change', `${lead.stage || 'new'} → ${stageId}`);
    lead.stage = stageId;
    saveLeads();
    renderKanban();
    if (openUrl === draggedUrl) renderDrawer(draggedUrl);
  }
  draggedUrl = null;
}

function copyText(text) {

    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    toast('Skopírované!', 'success');
  });
}

// ── CRM HELPERS ──
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

function initDefaults(l) {
  if (!l.stage) {
    l.stage = {new:'new', called:'called_no', confirmed:'contacted', rejected:'rejected'}[l.status] || 'new';
  }
  if (l.followup_date === undefined) l.followup_date = null;
  if (!l.followup_note) l.followup_note = '';
  if (!Array.isArray(l.notes)) {
    const old = l.notes;
    l.notes = (old && old.trim && old.trim()) ? [{id: uid(), ts: l.scraped_at || new Date().toISOString(), text: old.trim()}] : [];
  }
  if (!l.history) l.history = [];
  if (!l.overrides) l.overrides = {phone: null, email: null, contact_name: null};
}

function addHistory(l, type, data) {
  if (!l.history) l.history = [];
  l.history.unshift({ts: new Date().toISOString(), type, data: data || ''});
  if (l.history.length > 100) l.history.length = 100;
}

function timeAgo(ts) {
  const d = Date.now() - new Date(ts).getTime();
  const m = Math.floor(d / 60000);
  if (m < 1) return 'práve teraz';
  if (m < 60) return `pred ${m}m`;
  const h = Math.floor(m / 60);
  if (h < 24) return `pred ${h}h`;
  const dy = Math.floor(h / 24);
  return dy < 7 ? `pred ${dy}d` : new Date(ts).toLocaleDateString('sk-SK');
}

function stageHtml(stageId, urlEsc) {
  const s = STAGES[stageId] || STAGES.new;
  return `<span class="stage-pill" style="color:${s.color};background:${s.color}18"
    onclick="showStageDd(event,'${urlEsc}')">${s.emoji} ${esc(s.short)} ${ic.chevD}</span>`;
}

function notesHtml(lead) {
  const ns = lead.notes || [];
  if (!ns.length) return '<div style="font-size:12px;color:var(--text-muted);padding:4px 0">Žiadne poznámky</div>';
  return ns.map(n => `<div class="note-item">
    <div class="note-ts">${timeAgo(n.ts)} · ${new Date(n.ts).toLocaleString('sk-SK', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'})}</div>
    <div class="note-text">${esc(n.text)}</div>
    <button class="note-del" onclick="deleteNote('${esc(n.id)}')" title="Zmazať">✕</button>
  </div>`).join('');
}

function addNote() {
  const inp = document.getElementById('note-add-input');
  const text = (inp?.value || '').trim();
  if (!text || !openUrl) return;
  const lead = leads.find(l => l.url === openUrl);
  if (!lead) return;
  if (!lead.notes) lead.notes = [];
  if (lead.notes.length >= 20) { toast('Max 20 poznámok', 'error'); return; }
  lead.notes.unshift({id: uid(), ts: new Date().toISOString(), text});
  addHistory(lead, 'note_added', text.slice(0, 60));
  saveLeads();
  renderDrawer(openUrl);
}

function deleteNote(noteId) {
  if (!openUrl) return;
  const lead = leads.find(l => l.url === openUrl);
  if (!lead) return;
  lead.notes = (lead.notes || []).filter(n => n.id !== noteId);
  saveLeads();
  renderDrawer(openUrl);
}

function editContact(field) {
  const lead = leads.find(l => l.url === openUrl);
  if (!lead) return;
  const pc = lead.data?.primary_contact || {};
  const ov = lead.overrides || {};
  const rawKey = field === 'contact_name' ? 'name' : field;
  const current = ov[field] || pc[rawKey] || '';
  const el = document.getElementById(`ec-${field}`);
  if (!el) return;
  const row = el.closest('.d-row');
  const inp = document.createElement('input');
  inp.type = 'text'; inp.value = current; inp.className = 'edit-input';
  el.replaceWith(inp);
  row.querySelector('.manual-badge')?.remove();
  row.querySelector('.edit-pencil')?.remove();
  const saveBtn = document.createElement('button');
  saveBtn.className = 'icon-btn'; saveBtn.textContent = 'Uložiť';
  saveBtn.onclick = () => saveContactEdit(field, inp.value);
  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'icon-btn'; cancelBtn.textContent = 'Zrušiť';
  cancelBtn.onclick = () => renderDrawer(openUrl);
  inp.after(saveBtn); saveBtn.after(cancelBtn);
  inp.focus(); inp.select();
}

function saveContactEdit(field, newVal) {
  const lead = leads.find(l => l.url === openUrl);
  if (!lead) return;
  newVal = newVal.trim();
  if (!lead.overrides) lead.overrides = {phone: null, email: null, contact_name: null};
  lead.overrides[field] = newVal || null;
  addHistory(lead, 'contact_edited', `${field}: ${newVal}`);
  saveLeads();
  renderDrawer(openUrl);
}

// ── TOAST ──
function toast(msg, type = 'info', sub = '') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<div class="toast-msg">${esc(msg)}</div>${sub ? `<div class="toast-sub">${esc(sub)}</div>` : ''}`;
  document.getElementById('toast-container').appendChild(el);
  requestAnimationFrame(() => { requestAnimationFrame(() => el.classList.add('vis')); });
  setTimeout(() => {
    el.classList.remove('vis');
    setTimeout(() => el.remove(), 200);
  }, 3000);
}

// ── SCRAPE ──
async function scrape(url) {
  if (isScraping) return;
  url = url.trim();
  if (!url) return;
  isScraping = true;
  setScrapeLoading(true);
  const t0 = Date.now();
  const status = document.getElementById('scrape-status');
  let elapsed = 0;
  const timer = setInterval(() => { elapsed = Math.floor((Date.now() - t0) / 1000); status.textContent = `Scrapujem... (${elapsed}s)`; }, 1000);
  try {
    const data = await apiScrape(url);
    clearInterval(timer);
    upsertLead(data);
    render();
    const tier = data.tier || '';
    const score = data.score ?? '?';
    toast(`${strip(url)} — ${tier} (${score})`, 'success');
    if (openUrl === data.url) renderDrawer(data.url);
  } catch (e) {
    clearInterval(timer);
    toast(`Scrape zlyhal: ${e.message}`, 'error');
  } finally {
    isScraping = false;
    setScrapeLoading(false);
    status.textContent = '';
  }
}

function setScrapeLoading(on) {
  const btn = document.getElementById('scrape-btn');
  const icon = document.getElementById('scrape-icon');
  const txt = document.getElementById('scrape-txt');
  const input = document.getElementById('url-input');
  btn.disabled = on;
  input.disabled = on;
  icon.innerHTML = on ? ic.spinner : '→';
  txt.textContent = on ? 'Scrapujem' : 'Scrape';
}

// ── CSV ──
function parseCsv(text) {
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  const urls = [];
  lines.forEach((line, i) => {
    const first = line.split(',')[0].replace(/^["']|["']$/g, '').trim();
    if (!first) return;
    if (i === 0 && first.toLowerCase() === 'url') return;
    if (first.includes('.')) urls.push(first);
  });
  return urls;
}

function showCsvModal(urls) {
  csvUrls = urls;
  csvAborted = false;
  const modal = document.getElementById('csv-modal');
  document.getElementById('csv-modal-title').textContent = `Nájdených ${urls.length} URL`;
  document.getElementById('csv-modal-sub').textContent = `Scrape všetky sekvenčne? Každý URL zaberá 10–30 sekúnd.`;
  document.getElementById('csv-prog-wrap').style.display = 'none';
  document.getElementById('csv-prog-text').textContent = '';
  document.getElementById('csv-start-btn').disabled = false;
  document.getElementById('csv-start-btn').textContent = 'Spustiť';
  document.getElementById('csv-cancel-btn').textContent = 'Zrušiť';
  modal.style.display = 'flex';
}

document.getElementById('csv-start-btn').addEventListener('click', startCsvScrape);
document.getElementById('csv-cancel-btn').addEventListener('click', () => {
  csvAborted = true;
  document.getElementById('csv-modal').style.display = 'none';
});

async function startCsvScrape() {
  if (!csvUrls.length) return;
  const total = csvUrls.length;
  let done = 0, errors = [];
  document.getElementById('csv-start-btn').disabled = true;
  document.getElementById('csv-prog-wrap').style.display = 'block';
  document.getElementById('csv-modal-sub').textContent = '';

  for (const url of csvUrls) {
    if (csvAborted) break;
    document.getElementById('csv-prog-text').textContent = `Scrapujem ${done + 1}/${total} — ${strip(url)}`;
    document.getElementById('csv-prog-bar').style.width = `${Math.round((done / total) * 100)}%`;
    try {
      const data = await apiScrape(url);
      upsertLead(data);
      render();
    } catch (e) {
      errors.push(url);
    }
    done++;
  }

  document.getElementById('csv-prog-bar').style.width = '100%';
  document.getElementById('csv-modal').style.display = 'none';
  const ok = done - errors.length;
  toast(`Hotovo. ${ok} úspešných${errors.length ? `, ${errors.length} chýb` : ''}.`, errors.length ? 'info' : 'success');
}

// ── SOURCE CHANNELS ──
const SRC_PLACEHOLDER = {
  url:      'magano.sk, pandaoutdoor.cz...',
  profesia: 'napr. manažér, e-commerce, B2B obchodník...',
  heureka:  'napr. https://www.heureka.sk/nabytok/',
  eshops:   'napr. nábytok, kozmetika, pet...',
  orsr_new: 'napr. Bratislava (nechaj prázdne pre celé SK)',
  maps:     'napr. stolár | Bratislava  (odbor | mesto)',
};
const SRC_BTN = {
  url: 'Scrape', profesia: 'Hľadať', heureka: 'Hľadať',
  eshops: 'Hľadať', orsr_new: 'Hľadať', maps: 'Hľadať',
};

function switchSource(src) {
  activeSource = src;
  const autoLabel = document.getElementById('auto-scrape-label');
  if (autoLabel) autoLabel.style.display = src !== 'url' ? 'flex' : 'none';
  document.querySelectorAll('.src-tab').forEach(t => t.classList.toggle('active', t.dataset.src === src));
  const inp = document.getElementById('url-input');
  inp.placeholder = SRC_PLACEHOLDER[src] || '';
  document.getElementById('scrape-txt').textContent = SRC_BTN[src] || 'Hľadať';
  inp.value = '';
  inp.focus();
}

function onScrapeClick() {
  const val = document.getElementById('url-input').value.trim();
  if (!val && activeSource === 'url') return;
  if (activeSource === 'url') { scrape(val); return; }
  if (activeSource === 'profesia') { searchProfesia(val); return; }
  if (activeSource === 'heureka') { searchHeureka(val); return; }
  if (activeSource === 'eshops') { searchEshops(val); return; }
  if (activeSource === 'orsr_new') { searchOrsrNew(val); return; }
  if (activeSource === 'maps') { searchMaps(val); return; }
}

async function searchProfesia(keyword) {
  if (isScraping) return;
  isScraping = true;
  setScrapeLoading(true);
  const status = document.getElementById('scrape-status');

  if (autoScrapeEnabled) {
    status.textContent = 'Scrapujem Profesia.sk (auto)…';
    try {
      const resp = await fetch(`${API}/api/leads/source/auto`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': TOKEN },
        body: JSON.stringify({ channel: 'profesia', keyword, max_results: 20 })
      });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      let added = 0;
      (data.leads || []).forEach(lead => { if (lead.url) { upsertLead(lead); added++; } });
      render();
      toast(`${added} leadov z ${data.found_companies || 0} firiem (${data.skipped?.length || 0} preskočených)`, 'success');
    } catch (e) {
      toast(`Profesia.sk auto chyba: ${e.message}`, 'error');
    } finally {
      isScraping = false;
      setScrapeLoading(false);
      status.textContent = '';
    }
    return;
  }

  status.textContent = 'Hľadám na Profesia.sk...';
  try {
    const resp = await fetch(`${API}/api/leads/source/profesia`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': TOKEN },
      body: JSON.stringify({ keyword, max_results: 20 })
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    showSrcResults(data.results || [], 'profesia', data.total_found || 0, `Profesia.sk — "${keyword}"`);
  } catch (e) {
    toast(`Profesia.sk chyba: ${e.message}`, 'error');
  } finally {
    isScraping = false;
    setScrapeLoading(false);
    status.textContent = '';
  }
}

async function searchHeureka(categoryUrl) {
  if (isScraping) return;
  isScraping = true;
  setScrapeLoading(true);
  document.getElementById('scrape-status').textContent = 'Hľadám na Heureka.sk...';
  try {
    const resp = await fetch(`${API}/api/leads/source/heureka`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': TOKEN },
      body: JSON.stringify({ category_url: categoryUrl, max_results: 50 })
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    showSrcResults(data.results || [], 'heureka', data.total_found || 0, `Heureka.sk — ${data.category || categoryUrl}`);
  } catch (e) {
    toast(`Heureka.sk chyba: ${e.message}`, 'error');
  } finally {
    isScraping = false;
    setScrapeLoading(false);
    document.getElementById('scrape-status').textContent = '';
  }
}

async function searchEshops(category) {
  if (!category) { toast('Zadaj kategóriu e-shopov', 'error'); return; }
  if (isScraping) return;
  isScraping = true;
  setScrapeLoading(true);
  document.getElementById('scrape-status').textContent = 'Hľadám e-shopy...';
  try {
    const resp = await fetch(`${API}/api/leads/source/eshops`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': TOKEN },
      body: JSON.stringify({ category, max_results: 50, sources: ['pricemania', 'ecommerce_sk'] })
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    const mapped = (data.results || []).map(r => ({ ...r, company_name: r.shop_name, company_url: r.shop_url }));
    showSrcResults(mapped, 'eshops', data.total_found || 0, `E-shopy — "${category}"`);
    if (data.notes?.length) toast(data.notes.join(' | '), 'info');
  } catch (e) {
    toast(`E-shopy chyba: ${e.message}`, 'error');
  } finally {
    isScraping = false;
    setScrapeLoading(false);
    document.getElementById('scrape-status').textContent = '';
  }
}

async function searchOrsrNew(region) {
  if (isScraping) return;
  isScraping = true;
  setScrapeLoading(true);
  document.getElementById('scrape-status').textContent = 'Hľadám nové firmy...';
  try {
    const resp = await fetch(`${API}/api/leads/source/orsr_new`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': TOKEN },
      body: JSON.stringify({ days_back: 90, region: region || null, max_results: 30 })
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    if (data.status === 'not_implemented') {
      toast(`Nové firmy: ${data.message}`, 'info');
      return;
    }
    showSrcResults(data.results || [], 'orsr_new', data.total_found || 0, `Nové firmy — posledných 90 dní`);
  } catch (e) {
    toast(`ORSR chyba: ${e.message}`, 'error');
  } finally {
    isScraping = false;
    setScrapeLoading(false);
    document.getElementById('scrape-status').textContent = '';
  }
}

async function searchMaps(query) {
  if (!query) { toast('Zadaj odbor | mesto', 'error'); return; }
  if (isScraping) return;
  isScraping = true;
  setScrapeLoading(true);
  document.getElementById('scrape-status').textContent = 'Hľadám na Google Maps...';
  const parts = query.split('|').map(s => s.trim());
  const keyword = parts[0] || query;
  const location = parts[1] || '';
  try {
    const resp = await fetch(`${API}/api/leads/source/maps`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': TOKEN },
      body: JSON.stringify({ keyword, location, max_results: 20 })
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.detail || `HTTP ${resp.status}`);
    }
    const data = await resp.json();
    showSrcResults(data.results || [], 'maps', data.total_found || 0, `Google Maps — "${keyword}" ${location}`);
  } catch (e) {
    toast(`Google Maps: ${e.message}`, 'error');
  } finally {
    isScraping = false;
    setScrapeLoading(false);
    document.getElementById('scrape-status').textContent = '';
  }
}

function showSrcResults(results, source, totalFound, title) {
  srcResults = results;
  document.getElementById('src-modal-title').textContent = title;
  document.getElementById('src-modal-sub').textContent = `Nájdených: ${totalFound}, zobrazených: ${results.length}`;
  document.getElementById('src-list').innerHTML = results.map((r, i) => {
    const name = esc(r.company_name || r.shop_name || '—');
    const url = r.company_url || r.shop_url || '';
    const isAgency = r.url_confidence === 'agency';
    const meta = source === 'profesia'
      ? [r.job_title, r.location].filter(Boolean).join(' · ')
      : r.rating ? `Hodnotenie: ${r.rating}` : '';
    return `<div class="src-item${isAgency ? ' agency' : ''}">
      <input type="checkbox" id="src-cb-${i}" ${isAgency ? '' : 'checked'} ${!url ? 'disabled' : ''} onchange="updateSrcCount()">
      <label for="src-cb-${i}" class="src-item-info" style="cursor:pointer">
        <div class="src-item-name">${name}</div>
        ${url ? `<div class="src-item-url">${esc(url)}</div>` : `<div class="src-item-warn">⚠ URL neznáme — nebude scrapované</div>`}
        ${meta ? `<div class="src-item-meta">${esc(meta)}</div>` : ''}
        ${isAgency ? `<div class="src-item-meta" style="color:var(--tier-dead)">Personálna agentúra</div>` : ''}
      </label>
    </div>`;
  }).join('');
  updateSrcCount();
  document.getElementById('src-modal').style.display = 'flex';
  if (autoScrapeEnabled) {
    setTimeout(() => {
      const urls = srcResults.map(r => r.company_url || r.shop_url || '').filter(Boolean);
      if (urls.length) {
        document.getElementById('src-modal').style.display = 'none';
        showCsvModal(urls);
        setTimeout(() => document.getElementById('csv-start-btn').click(), 80);
      }
    }, 50);
  }
}

function updateSrcCount() {
  const validUrls = [...document.querySelectorAll('#src-list input[type="checkbox"]:checked')].map(cb => {
    const i = parseInt(cb.id.replace('src-cb-', ''));
    const r = srcResults[i];
    return r?.company_url || r?.shop_url || '';
  }).filter(Boolean);
  document.getElementById('src-scrape-btn').textContent = `Scrapovať vybrané (${validUrls.length})`;
  document.getElementById('src-select-count').textContent = `${validUrls.length} s URL`;
}

function closeSrcModal() {
  document.getElementById('src-modal').style.display = 'none';
}

function scrapeSelected() {
  const urls = [...document.querySelectorAll('#src-list input[type="checkbox"]:checked')].map(cb => {
    const i = parseInt(cb.id.replace('src-cb-', ''));
    const r = srcResults[i];
    return r?.company_url || r?.shop_url || '';
  }).filter(Boolean);
  if (!urls.length) { toast('Žiadne URL na scrapovanie', 'error'); return; }
  closeSrcModal();
  showCsvModal(urls);
}

// ── EVENTS ──
document.getElementById('scrape-btn').addEventListener('click', onScrapeClick);
document.getElementById('auto-scrape-cb').addEventListener('change', e => {
  autoScrapeEnabled = e.target.checked;
});
document.getElementById('url-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') onScrapeClick();
});
document.getElementById('csv-btn').addEventListener('click', () => {
  document.getElementById('csv-file').click();
});
document.getElementById('csv-file').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const urls = parseCsv(ev.target.result);
    if (!urls.length) { toast('Žiadne URL v súbore', 'error'); return; }
    showCsvModal(urls);
  };
  reader.readAsText(file);
  e.target.value = '';
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    filter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

document.querySelector('.col-score.sortable')?.addEventListener('click', () => {
  sortDir = sortDir === 'desc' ? 'asc' : 'desc';
  document.getElementById('sort-ind').textContent = sortDir === 'desc' ? '↓' : '↑';
  render();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeDrawer(); closeDd(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('url-input').focus();
    document.getElementById('url-input').select();
  }
});

// ── INIT ──
loadLeads();
render();
</script>
