<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wector — Sales Intelligence</title>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  :root {
    --bg: #0b0c0f;
    --sidebar: #0e0f13;
    --card: #141519;
    --card-2: #16171c;
    --surface: #1a1c22;
    --border: #23252b;
    --border-2: #2e3138;
    --text: #e6e7ea;
    --muted: #8a8f98;
    --muted-2: #a8adb8;
    --accent: #6366f1;
    --accent-hover: #5457e5;
    --accent-soft: rgba(99,102,241,.14);
    --accent-fg: #ffffff;
    --hot: #ef4444;
    --warm: #f97316;
    --cool: #3b82f6;
    --dead: #6b7280;
    --green: #22c55e;
    --purple: #a855f7;
    --radius: 8px;
    --shadow: 0 12px 40px -12px rgba(0,0,0,.7);
  }
  [data-theme="light"] {
    --bg: #f7f8fa;
    --sidebar: #ffffff;
    --card: #ffffff;
    --card-2: #f4f5f7;
    --surface: #f0f1f4;
    --border: #e5e7eb;
    --border-2: #d3d6dc;
    --text: #1a1d23;
    --muted: #6b7280;
    --muted-2: #4b5563;
    --accent-soft: rgba(99,102,241,.1);
    --shadow: 0 12px 40px -12px rgba(0,0,0,.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    font-size: 13.5px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    transition: background .2s ease, color .2s ease;
  }
  ::selection { background: var(--accent-soft); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 6px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, select, textarea { font-family: inherit; font-size: 13.5px; }
  [data-lucide] { stroke-width: 2; vertical-align: middle; }
  .ln-svg { width: 15px; height: 15px; vertical-align: middle; flex-shrink: 0; }
  .act .ln-svg { width: 16px; height: 16px; }
  .activity-btns .ab .ln-svg { width: 14px; height: 14px; }

  /* ===== NAVBAR ===== */
  .navbar {
    position: sticky; top: 0; z-index: 50;
    display: flex; align-items: center; gap: 20px;
    padding: 0 18px; height: 56px;
    background: var(--sidebar);
    border-bottom: 1px solid var(--border);
  }
  .logo { display: flex; align-items: center; gap: 9px; font-size: 15px; font-weight: 700; letter-spacing: -.01em; white-space: nowrap; }
  .logo .mark {
    width: 22px; height: 22px; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center;
    background: var(--accent); color: #fff;
  }
  .logo .mark [data-lucide] { width: 14px; height: 14px; }
  .nav-stats { display: flex; gap: 18px; align-items: center; }
  .nav-stat { font-size: 12.5px; font-weight: 600; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .nav-stat .dot { width: 7px; height: 7px; border-radius: 50%; }
  .nav-stat b { color: var(--text); font-weight: 700; }
  .nav-spacer { flex: 1; }
  .nav-right { display: flex; align-items: center; gap: 8px; position: relative; }
  .icon-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 34px; height: 34px; border-radius: 7px;
    background: transparent; border: 1px solid var(--border);
    color: var(--muted-2); transition: all .14s ease;
  }
  .icon-btn:hover { background: var(--surface); color: var(--text); border-color: var(--border-2); }
  .icon-btn [data-lucide] { width: 17px; height: 17px; }
  .lang-btn {
    display: inline-flex; align-items: center; gap: 6px; height: 34px; padding: 0 10px;
    border-radius: 7px; border: 1px solid var(--border); color: var(--muted-2);
    font-size: 12.5px; font-weight: 600; transition: all .14s ease;
  }
  .lang-btn:hover { background: var(--surface); color: var(--text); border-color: var(--border-2); }
  .lang-btn [data-lucide] { width: 14px; height: 14px; }

  /* dropdown menu (lang + more) */
  .menu {
    position: absolute; z-index: 80; min-width: 190px;
    background: var(--card); border: 1px solid var(--border-2);
    border-radius: 9px; box-shadow: var(--shadow); padding: 5px;
    animation: fadeUp .12s ease;
  }
  .menu button {
    display: flex; align-items: center; gap: 10px; width: 100%; text-align: left;
    padding: 8px 10px; border-radius: 6px; font-size: 13px; color: var(--text);
  }
  .menu button:hover { background: var(--surface); }
  .menu button.active { color: var(--accent); font-weight: 600; }
  .menu button.danger { color: var(--hot); }
  .menu button .flag { font-size: 15px; line-height: 1; }
  .menu button [data-lucide] { width: 15px; height: 15px; color: var(--muted); }
  .menu .sep { height: 1px; background: var(--border); margin: 4px 0; }
  .menu .check { margin-left: auto; color: var(--accent); }
  .menu .check [data-lucide] { width: 15px; height: 15px; }

  /* ===== APP LAYOUT ===== */
  .app { display: flex; min-height: calc(100vh - 56px); }
  .sidebar {
    width: 230px; flex-shrink: 0; border-right: 1px solid var(--border);
    background: var(--sidebar); padding: 16px 12px; overflow-y: auto;
  }
  .side-group { margin-bottom: 22px; }
  .side-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); padding: 0 8px; margin-bottom: 8px; }
  .side-item {
    display: flex; align-items: center; gap: 9px; width: 100%; text-align: left;
    padding: 7px 8px; border-radius: 6px; font-size: 13px; color: var(--muted-2);
    transition: all .12s ease;
  }
  .side-item:hover { background: var(--surface); color: var(--text); }
  .side-item.active { background: var(--accent-soft); color: var(--text); font-weight: 600; }
  .side-item [data-lucide] { width: 16px; height: 16px; }
  .side-item .side-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .side-item .count { margin-left: auto; font-size: 11.5px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .side-item.active .count { color: var(--muted-2); }

  /* ===== MAIN ===== */
  .main { flex: 1; padding: 22px 26px; min-width: 0; }
  .page-head { margin-bottom: 18px; }
  .page-head h1 { font-size: 20px; font-weight: 700; letter-spacing: -.02em; }
  .page-head p { color: var(--muted); font-size: 13px; margin-top: 2px; }

  /* QUICK ADD */
  .quick-add { display: flex; gap: 9px; margin-bottom: 16px; max-width: 620px; }
  .input-wrap { position: relative; flex: 1; }
  .input-wrap [data-lucide] { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--muted); }
  .quick-add input {
    width: 100%; background: var(--card); border: 1px solid var(--border);
    color: var(--text); padding: 10px 13px 10px 36px; border-radius: 7px; outline: none;
    transition: border-color .15s ease;
  }
  .quick-add input:focus { border-color: var(--accent); }
  .quick-add input::placeholder { color: var(--muted); }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 7px;
    padding: 10px 15px; border-radius: 7px; font-weight: 600; font-size: 13px;
    white-space: nowrap; transition: all .15s ease;
  }
  .btn [data-lucide] { width: 15px; height: 15px; }
  .btn-primary { background: var(--accent); color: var(--accent-fg); }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
  .btn-ghost { background: var(--card-2); border: 1px solid var(--border); color: var(--text); }
  .btn-ghost:hover { border-color: var(--border-2); background: var(--surface); }
  .btn-sm { padding: 7px 11px; font-size: 12.5px; }

  /* ===== TABLE ===== */
  .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .04em; color: var(--muted); padding: 11px 14px;
    border-bottom: 1px solid var(--border); white-space: nowrap; background: var(--card);
  }
  tbody td { padding: 11px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tbody tr { transition: background .1s ease; cursor: pointer; }
  tbody tr:hover { background: var(--card-2); }
  tbody tr:last-child td { border-bottom: none; }
  .col-num { color: var(--muted); font-variant-numeric: tabular-nums; width: 34px; }
  .shop-cell { display: flex; flex-direction: column; gap: 1px; }
  .shop-cell .domain { font-weight: 600; }
  .shop-cell .ico { font-size: 11px; color: var(--muted); }
  .cell-name { font-weight: 500; }
  .cell-sub { font-size: 11px; color: var(--muted); }
  .mono { font-variant-numeric: tabular-nums; white-space: nowrap; }
  .truncate { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: inline-block; color: var(--muted-2); }

  /* score */
  .score-chip {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 34px; padding: 3px 8px; border-radius: 6px; font-weight: 700;
    font-variant-numeric: tabular-nums; font-size: 12.5px;
    background: var(--surface); border: 1px solid var(--border);
  }
  .score-chip[data-tier="HOT"] { color: var(--hot); }
  .score-chip[data-tier="WARM"] { color: var(--warm); }
  .score-chip[data-tier="COOL"] { color: var(--cool); }
  .score-chip[data-tier="DEAD"] { color: var(--muted); }

  /* tier badge — text only, no emoji */
  .tier {
    display: inline-flex; align-items: center; padding: 3px 9px;
    border-radius: 5px; font-size: 11px; font-weight: 700; letter-spacing: .03em;
    text-transform: uppercase; white-space: nowrap;
  }
  .tier-HOT { background: color-mix(in srgb, var(--hot) 16%, transparent); color: var(--hot); }
  .tier-WARM { background: color-mix(in srgb, var(--warm) 16%, transparent); color: var(--warm); }
  .tier-COOL { background: color-mix(in srgb, var(--cool) 16%, transparent); color: var(--cool); }
  .tier-DEAD { background: color-mix(in srgb, var(--dead) 22%, transparent); color: var(--muted-2); }

  /* status select */
  .status-select {
    appearance: none; -webkit-appearance: none;
    padding: 4px 24px 4px 9px; border-radius: 5px; font-size: 11.5px; font-weight: 600;
    border: 1px solid transparent; outline: none; cursor: pointer; letter-spacing: .02em;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='%238a8f98' stroke-width='3'><path d='M6 9l6 6 6-6'/></svg>");
    background-repeat: no-repeat; background-position: right 7px center;
    transition: all .15s ease;
  }
  .st-novy { background-color: color-mix(in srgb, var(--dead) 22%, transparent); color: var(--muted-2); }
  .st-kontaktovany { background-color: color-mix(in srgb, var(--cool) 16%, transparent); color: var(--cool); }
  .st-odpovedal { background-color: color-mix(in srgb, var(--green) 16%, transparent); color: var(--green); }
  .st-bezodpovede { background-color: color-mix(in srgb, var(--hot) 16%, transparent); color: var(--hot); }
  .st-uzavrety { background-color: color-mix(in srgb, var(--purple) 16%, transparent); color: var(--purple); }
  .status-select option { background: var(--card); color: var(--text); }

  /* actions */
  .actions { display: flex; gap: 2px; align-items: center; }
  .act {
    display: inline-flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; border-radius: 6px; color: var(--muted); transition: all .12s ease;
  }
  .act [data-lucide] { width: 16px; height: 16px; }
  .act:hover { background: var(--surface); color: var(--text); }
  .act.call:hover { color: var(--green); }
  .act.email:hover { color: var(--cool); }
  .act.linkedin:hover { color: #0a66c2; }
  .empty-row td { text-align: center; color: var(--muted); padding: 44px; }

  /* ===== OVERLAY / MODAL ===== */
  .overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,.55); backdrop-filter: blur(3px);
    display: flex; align-items: center; justify-content: center; padding: 24px;
    animation: fadeIn .15s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .modal {
    width: 100%; max-width: 1040px; max-height: 88vh; overflow: auto;
    background: var(--card); border: 1px solid var(--border-2); border-radius: 14px; box-shadow: var(--shadow);
    animation: modalIn .2s cubic-bezier(.16,1,.3,1);
  }
  @keyframes modalIn { from { opacity: 0; transform: translateY(16px) scale(.99); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .modal-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 17px 20px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--card); z-index: 2;
  }
  .modal-head h2 { font-size: 16px; font-weight: 700; }
  .modal-body { padding: 20px; }
  .x-btn { width: 32px; height: 32px; border-radius: 7px; color: var(--muted); }
  .x-btn:hover { background: var(--surface); color: var(--text); }
  .x-btn [data-lucide] { width: 17px; height: 17px; }

  .cand-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .cand-col { border: 1px solid var(--border); border-radius: 11px; padding: 13px; background: var(--bg); }
  .cand-col.reg { border-color: color-mix(in srgb, var(--green) 45%, var(--border)); }
  .cand-col.tel { border-color: color-mix(in srgb, var(--cool) 45%, var(--border)); }
  .cand-col.eml { border-color: color-mix(in srgb, var(--warm) 45%, var(--border)); }
  .cand-col h3 { font-size: 12.5px; font-weight: 700; margin-bottom: 11px; }
  .cand-col.reg h3 { color: var(--green); }
  .cand-col.tel h3 { color: var(--cool); }
  .cand-col.eml h3 { color: var(--warm); }
  .cand-list { display: flex; flex-direction: column; gap: 8px; min-height: 56px; }
  .pick { border: 1px solid var(--border); border-radius: 8px; padding: 10px 11px; background: var(--card); cursor: pointer; transition: all .14s ease; position: relative; }
  .pick:hover { border-color: var(--border-2); }
  .pick.sel { border-color: var(--accent); background: var(--accent-soft); }
  .pick.sel .pick-check { display: inline-flex; }
  .pick-check { display: none; position: absolute; top: 9px; right: 10px; color: var(--accent); }
  .pick-check [data-lucide] { width: 15px; height: 15px; }
  .pick.disabled { opacity: .45; cursor: not-allowed; }
  .pick .title { font-weight: 600; }
  .pick .meta { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
  .pick .ctx { font-size: 11.5px; color: var(--muted-2); margin-top: 5px; font-style: italic; }
  .mini-badge { display: inline-block; padding: 1px 7px; border-radius: 4px; font-size: 10.5px; font-weight: 700; margin-top: 6px; text-transform: uppercase; letter-spacing: .03em; }
  .mb-personal { background: color-mix(in srgb, var(--green) 18%, transparent); color: var(--green); }
  .mb-generic { background: color-mix(in srgb, var(--dead) 25%, transparent); color: var(--muted-2); }
  .mb-info { background: color-mix(in srgb, var(--cool) 18%, transparent); color: var(--cool); }
  .cand-empty { color: var(--muted); font-size: 12.5px; padding: 14px 4px; text-align: center; }

  .score-preview {
    margin-top: 16px; border: 1px solid var(--border-2); border-radius: 11px; padding: 17px; background: var(--bg);
    display: grid; grid-template-columns: auto 1fr auto; gap: 18px; align-items: center; animation: fadeUp .2s ease;
  }
  .sp-num { font-size: 38px; font-weight: 800; font-variant-numeric: tabular-nums; line-height: 1; }
  .sp-break { font-size: 12.5px; color: var(--muted-2); white-space: pre-line; }
  .sp-tier { margin-top: 7px; }
  .spinner { width: 15px; height: 15px; border: 2px solid color-mix(in srgb, currentColor 30%, transparent); border-top-color: currentColor; border-radius: 50%; animation: spin .6s linear infinite; display: inline-block; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-pad { padding: 40px; text-align: center; color: var(--muted); }

  /* ===== DRAWER ===== */
  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0; z-index: 90;
    width: 410px; max-width: 92vw; background: var(--card);
    border-left: 1px solid var(--border-2); box-shadow: var(--shadow);
    display: flex; flex-direction: column; animation: slideIn .25s cubic-bezier(.16,1,.3,1);
  }
  @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  .drawer-head { padding: 18px 20px; border-bottom: 1px solid var(--border); }
  .drawer-head .top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .drawer-head h2 { font-size: 17px; font-weight: 700; }
  .drawer-head .role { color: var(--muted); font-size: 12.5px; }
  .drawer-head .url { font-size: 12px; color: var(--muted-2); margin-top: 11px; display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
  .drawer-head .url span { display: inline-flex; align-items: center; gap: 5px; }
  .drawer-head .url [data-lucide] { width: 13px; height: 13px; color: var(--muted); }
  .drawer-body { padding: 18px 20px; overflow-y: auto; flex: 1; }
  .section { margin-bottom: 22px; }
  .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin: 0 0 10px; }
  .contact-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .contact-row:last-of-type { border-bottom: none; }
  .contact-row .ic { color: var(--muted); display: inline-flex; }
  .contact-row .ic [data-lucide] { width: 16px; height: 16px; }
  .contact-row .val { flex: 1; font-weight: 500; }
  .copy-btn { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; color: var(--muted); padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border); }
  .copy-btn:hover { color: var(--text); border-color: var(--border-2); }
  .copy-btn [data-lucide] { width: 13px; height: 13px; }
  .ln-btn { width: 100%; margin-top: 8px; }

  .timeline { display: flex; flex-direction: column; }
  .tl-item { display: flex; gap: 10px; padding: 8px 0; }
  .tl-item .dot { width: 24px; height: 24px; border-radius: 6px; background: var(--surface); display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--muted-2); }
  .tl-item .dot [data-lucide] { width: 13px; height: 13px; }
  .tl-item .tl-text { font-size: 13px; }
  .tl-item .tl-date { font-size: 11px; color: var(--muted); }
  .tl-empty { color: var(--muted); font-size: 12.5px; }

  .activity-btns { display: grid; grid-template-columns: repeat(2, 1fr); gap: 7px; margin-bottom: 9px; }
  .activity-btns .ab { padding: 8px; border-radius: 7px; border: 1px solid var(--border); background: var(--card-2); font-size: 12.5px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px; color: var(--muted-2); }
  .activity-btns .ab [data-lucide] { width: 14px; height: 14px; }
  .activity-btns .ab:hover { border-color: var(--border-2); color: var(--text); }
  .activity-btns .ab.active { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
  .activity-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 9px 11px; border-radius: 7px; outline: none; margin-bottom: 9px; resize: vertical; min-height: 58px; }
  .activity-input:focus { border-color: var(--accent); }

  .next-action { border: 1px solid color-mix(in srgb, var(--accent) 40%, var(--border)); background: var(--accent-soft); border-radius: 9px; padding: 13px; }
  .next-action .na-text { font-weight: 600; font-size: 13px; margin-bottom: 10px; display: flex; gap: 8px; align-items: flex-start; }
  .next-action .na-text [data-lucide] { width: 16px; height: 16px; color: var(--accent); flex-shrink: 0; margin-top: 1px; }
  .drawer-score { display: inline-flex; align-items: center; justify-content: center; width: 44px; height: 44px; border-radius: 9px; font-size: 17px; font-weight: 800; background: var(--surface); border: 1px solid var(--border); flex-shrink: 0; }

  /* toast */
  .toast-wrap { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 200; display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .toast {
    background: var(--card); border: 1px solid var(--border-2); color: var(--text);
    padding: 10px 15px; border-radius: 9px; box-shadow: var(--shadow); font-size: 13px; font-weight: 500;
    animation: fadeUp .2s ease; display: flex; align-items: center; gap: 9px; max-width: 440px;
  }
  .toast [data-lucide] { width: 16px; height: 16px; flex-shrink: 0; }
  .toast.ok { border-color: color-mix(in srgb, var(--green) 50%, var(--border)); }
  .toast.ok [data-lucide] { color: var(--green); }

/* ---------- State ---------- */
let leads = [];
let uid = 1;
let filterTier = "ALL";
let filterStatus = "ALL";

function load() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) { const p = JSON.parse(raw); if (Array.isArray(p) && p.length) leads = p; }
  } catch (e) {}
  if (!leads.length) leads = SEED.map((l, i) => hydrate({ ...l, id: i + 1 }));
  else leads = leads.map(hydrate);
  uid = leads.reduce((m, l) => Math.max(m, l.id), 0) + 1;
}
function hydrate(l) {
  const status = LEGACY_STATUS[l.status] || l.status || "novy";
  return {
    archived: false, notes: "",
    timeline: l.timeline || [{ type:"lead", date: todaySk(), text: t("tl_lead_added") }],
    ...l, status,
    tier: l.tier || tierFromScore(l.score || 0),
  };
}
function save() { try { localStorage.setItem(STORE_KEY, JSON.stringify(leads)); } catch (e) {} }
function getLead(id) { return leads.find(l => l.id === Number(id)); }

/* ---------- Utils ---------- */
function esc(s) {
  return String(s == null ? "" : s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}
function todaySk() { const d=new Date(); return `${String(d.getDate()).padStart(2,"0")}.${String(d.getMonth()+1).padStart(2,"0")}.${d.getFullYear()}`; }
function fmtPhone(p) {
  if (!p) return "";
  const c = p.replace(/\s/g, "");
  let m = c.match(/^\+421(\d{3})(\d{3})(\d{3})$/); if (m) return `+421 ${m[1]} ${m[2]} ${m[3]}`;
  m = c.match(/^\+420(\d{3})(\d{3})(\d{3})$/); if (m) return `+420 ${m[1]} ${m[2]} ${m[3]}`;
  m = c.match(/^0(\d{3})(\d{3})(\d{3})$/); if (m) return `0${m[1]} ${m[2]} ${m[3]}`;
  return p;
}
function domainOnly(u) { return String(u||"").replace(/^https?:\/\//,"").replace(/^www\./,"").replace(/\/.*$/,""); }
function normUrl(u) { u = String(u||"").trim(); if (!/^https?:\/\//i.test(u)) u = "https://" + u; return u; }
function isPersonalPhone(p) { return /^(\+421\s?9|09|\+420\s?[67]|0[67])/.test(String(p||"").replace(/\s/g,"")); }
// Lucide odstránil brand ikonu "linkedin" — vlastný inline SVG fallback (zachová data-lucide pre CSS veľkosti)
const LINKEDIN_SVG = '<svg class="ln-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19 0h-14c-2.76 0-5 2.24-5 5v14c0 2.76 2.24 5 5 5h14c2.76 0 5-2.24 5-5v-14c0-2.76-2.24-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.27c-.97 0-1.75-.79-1.75-1.76s.78-1.75 1.75-1.75 1.75.79 1.75 1.75-.78 1.76-1.75 1.76zm13.5 12.27h-3v-5.6c0-3.37-4-3.12-4 0v5.6h-3v-11h3v1.77c1.4-2.59 7-2.78 7 2.47v6.76z"/></svg>';
function icons() {
  // nahraď linkedin PRED createIcons, inak Lucide spamuje warning (brand ikona odstránená)
  document.querySelectorAll('i[data-lucide="linkedin"]').forEach(el => { el.outerHTML = LINKEDIN_SVG; });

function toast(msg, kind="") {
  const w = document.getElementById("toastWrap");
  const ic = kind==="ok"?"check-circle":kind==="err"?"alert-triangle":kind==="warn"?"alert-circle":"info";
  const el = document.createElement("div");
  el.className = "toast " + kind;
  el.innerHTML = `<i data-lucide="${ic}"></i><span></span>`;
  el.querySelector("span").textContent = msg;
  w.appendChild(el); icons();
  setTimeout(() => { el.style.opacity="0"; el.style.transition="opacity .2s"; setTimeout(()=>el.remove(),220); }, 2800);
}
async function copy(text) { try { await navigator.clipboard.writeText(text); toast(t("toast_copied") + ": " + text, "ok"); } catch(e) { toast("—","err"); } }
function linkedinUrl(name, company) {
  const q = encodeURIComponent(`${name||""} ${domainOnly(company).split(".")[0]||""}`.trim());
  return `https://www.linkedin.com/search/results/people/?keywords=${q}`;
}

/* ---------- API ---------- */
async function api(path, body) {
  const res = await fetch(API_BASE + path, {
    method:"POST", headers:{ "Content-Type":"application/json", "Authorization":AUTH }, body: JSON.stringify(body),
  });
  if (!res.ok) { const e = new Error("HTTP " + res.status); e.http = res.status; throw e; }
  return res.json();
}

/* ============================================================
   SCRAPE  (backend returns FLAT object)
   ============================================================ */
const scrapeBtn = document.getElementById("scrapeBtn");
const scrapeBtnText = document.getElementById("scrapeBtnText");
const urlInput = document.getElementById("urlInput");
scrapeBtn.addEventListener("click", runScrape);
urlInput.addEventListener("keydown", (e) => { if (e.key === "Enter") runScrape(); });

async function runScrape() {
  const raw = urlInput.value.trim();
  if (!raw) { toast(t("enter_url"), "err"); urlInput.focus(); return; }
  const url = normUrl(raw);
  scrapeBtn.disabled = true;
  scrapeBtnText.textContent = t("scrape_loading");
  try {
    const d = await api("/api/leads/scrape", { url });
    const ext = d.extracted || {};
    const konatel = nn(ext.contact_name) || nn(d.meno) || "";
    const telefon = nn(ext.phone) || nn(d.telefon) || "";
    const email = nn(ext.email) || nn(d.email) || "";
    const score = (typeof d.score === "number") ? d.score : estimateScore(konatel, telefon, email);
    const tier = d.tier || tierFromScore(score);
    const lead = hydrate({
      id: uid++, shop: domainOnly(d.primary_identifier || d.url || url), konatel,
      rola: nn(ext.contact_role) || nn(d.rola) || "", telefon, email, score, tier, status:"novy",
      ico: ext.ico || d.ico || "",
      reasoning: ext.reasoning || d.reasoning || "",
      phone_type: ext.phone_type || "",
      phone_confidence: ext.phone_confidence || "",
      employee_count: ext.employee_count || "",
      employee_category: ext.employee_category || "",
      name_found_on_web: ext.name_found_on_web || false,
      score_breakdown: ext.score_breakdown || [],
      all_phones: ext.all_phones || [],
      other_contacts: ext.other_contacts || [],
      registry_source: ext.registry_source || "",
    });
    leads.unshift(lead);
    save(); renderSidebar(); renderTable();
    urlInput.value = "";
    if (!konatel && !telefon && !email) toast(t("toast_no_contact"), "warn");
    else toast(t("toast_added") + ": " + lead.shop, "ok");
  } catch (err) {
    // network failure (TypeError) alebo HTTP chyba => backend nedostupný
    toast(t("toast_backend_down"), "err");
    console.error("scrape error:", err);
  } finally {
    scrapeBtn.disabled = false;
    scrapeBtnText.textContent = t("scrape_btn");
  }
}
function estimateScore(k, p, e) { let s=0; if(k)s+=50; if(p)s+=isPersonalPhone(p)?20:10; if(e)s+=5; return s; }
function nn(v) { return (!v || v === "null" || v === "None" || v === "N/A") ? "" : v; }

function scoreCircle(score, tier) {
  const r = 17, cx = 22, cy = 22, circ = 2 * Math.PI * r;
  const dash = (Math.min(100, Math.max(0, score)) / 100 * circ).toFixed(1);
  const colors = { HOT:"var(--hot)", WARM:"var(--warm)", COOL:"var(--cool)", DEAD:"var(--dead)" };
  const c = colors[tier] || "var(--muted)";
  return `<svg width="44" height="44" viewBox="0 0 44 44" style="flex-shrink:0">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="3.5"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${c}" stroke-width="3.5"
      stroke-dasharray="${dash} ${circ.toFixed(1)}" stroke-linecap="round"
      transform="rotate(-90 ${cx} ${cy})"/>
    <text x="${cx}" y="${cy + 4.5}" text-anchor="middle" fill="${c}"
      font-size="11.5" font-weight="800" font-family="Inter,system-ui,sans-serif">${score}</text>
  </svg>`;
}

function mockCandidates(l) {
  return {
    registry:{ source:"orsr", ico:l.ico, konatelia: l.konatel?[{meno:l.konatel, funkcia:l.rola||"konateľ"}]:[] },
    phones: l.telefon?[{cislo:l.telefon, typ_pravdepodobne:isPersonalPhone(l.telefon)?"personal":"info", blizke_meno:l.konatel, kontext_pred:"", stranka:"/kontakt"}]:[],
    emails: l.email?[{email:l.email, typ_pravdepodobne:/^(info@|kontakt@|obchod@)/.test(l.email)?"generic":"personal", stranka:"/"}]:[],
  };
}
function renderCandBody() {
  const d = candState.data || {};
  const reg = d.registry || {}; const konatelia = reg.konatelia || []; const phones = d.phones || []; const emails = d.emails || [];
  const regCards = konatelia.length ? konatelia.map((k,i)=>`
    <div class="pick ${candState.reg===i?"sel":""}" data-pick="reg" data-i="${i}">
      <span class="pick-check"><i data-lucide="check"></i></span>
      <div class="title">${esc(k.meno)}</div>

    </div>`).join("") : `<div class="cand-empty">${esc(t("cand_reg_empty"))}</div>`;
  const phoneCards = phones.length ? phones.map((p,i)=>{

    const generic = em.typ_pravdepodobne==="generic";
    const badge = generic?`<span class="mini-badge mb-generic">${esc(t("badge_generic"))}</span>`:`<span class="mini-badge mb-personal">${esc(t("badge_personal"))}</span>`;
    return `<div class="pick ${candState.email===i?"sel":""}" data-pick="email" data-i="${i}">

    el.addEventListener("click", ()=>{

function maybeRenderScorePreview() {
  const host = document.getElementById("scorePreview"); if (!host) return;
  const { reg, phone, email, data } = candState;
  if (reg===null || phone===null) { host.innerHTML = ""; return; }
  const k = data.registry.konatelia[reg], p = data.phones[phone];
  const em = (email!==null && data.emails[email]) ? data.emails[email] : null;
  let score = 0; const lines = [];
  score+=30; lines.push("+30 Registry konateľ");
  if (p.typ_pravdepodobne==="personal") { score+=20; lines.push("+20 Personal telefón"); } else { score+=10; lines.push("+10 Info telefón"); }
  if (em) { if (em.typ_pravdepodobne==="generic") { score+=5; lines.push("+5 Generic email"); } else { score+=15; lines.push("+15 Personal email"); } }
  score+=20; lines.push("+20 " + (k.funkcia||t("role_director")));
  const tier = tierFromScore(score);
  candState._preview = { score, tier, breakdown: lines.join("\n"), k, p, em };
  host.innerHTML = `
    <div class="score-preview">
      <div>
        <div class="sp-num" id="spNum" style="color:var(--${TIER_VAR[tier]})">0</div>
        <div class="sp-tier"><span class="tier tier-${tier}">${tier}</span></div>
      </div>
      <div class="sp-break">${esc(lines.join("\n"))}</div>
      <div><button class="btn btn-primary" id="saveLeadBtn"><i data-lucide="save"></i> ${esc(t("save_lead"))}</button></div>
    </div>`;
  countUp(document.getElementById("spNum"), score, 600);
  document.getElementById("saveLeadBtn").addEventListener("click", saveLeadFromCandidates);
  icons();
}
function countUp(el, target, dur) {
  if (!el) return; const start = performance.now();
  (function step(now){ const p=Math.min(1,(now-start)/dur); el.textContent=Math.round((1-Math.pow(1-p,3))*target); if(p<1) requestAnimationFrame(step); })(performance.now());
}
async function saveLeadFromCandidates() {
  const pv = candState._preview, lead = candState.lead, reg = candState.data.registry || {};
  const btn = document.getElementById("saveLeadBtn");
  btn.disabled = true; btn.innerHTML = `<span class="spinner"></span> ${esc(t("saving"))}`;
  let finalScore = pv.score, finalTier = pv.tier;
  try {
    const sel = await api("/api/leads/select", { url: normUrl(lead.shop), konatel:pv.k, phone:pv.p, email:pv.em||null, ico:reg.ico||lead.ico||"" });
    if (sel.score && sel.score.total!=null) finalScore = sel.score.total;
    if (sel.tier && sel.tier.name) finalTier = sel.tier.name;
    if (typeof sel.score === "number") finalScore = sel.score;
    if (typeof sel.tier === "string") finalTier = sel.tier;
  } catch(e) {}
  lead.konatel = pv.k.meno; lead.rola = pv.k.funkcia || lead.rola; lead.telefon = pv.p.cislo;
  lead.email = pv.em ? pv.em.email : lead.email; lead.ico = reg.ico || lead.ico || "";
  lead.score = finalScore; lead.tier = finalTier;
  lead.timeline.unshift({ type:"lead", date: todaySk(), text: t("tl_cand_confirmed") + " • " + finalScore });
  save(); closeModal(); renderSidebar(); renderTable();
  toast(t("toast_saved") + " — " + finalScore + " " + finalTier, "ok");
}

function startInlineEdit(ed) {
  const field = ed.dataset.edit;
  const id = Number(ed.dataset.id);

  const cur = l[field] || "";
  ed.innerHTML = `<input class="inline-input" value="${esc(cur)}">`;

  function commit() {
    const val = inp.value.trim();
    l[field] = val;
    l.score = recalcScore(l);
    l.tier = tierFromScore(l.score);
    save(); renderTable();
  }
  inp.addEventListener("blur", commit);
  inp.addEventListener("keydown", (ev) => {
    if (ev.key === "Enter") { ev.preventDefault(); inp.blur(); }
    if (ev.key === "Escape") { inp.value = cur; inp.blur(); }
  });
}
function recalcScore(l) {
  let s = 0;
  if (l.konatel) s += 50;
  if (l.telefon) s += isPersonalPhone(l.telefon) ? 20 : 10;
  if (l.email) s += 5;
  return s;
}

    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const text = ev.target.result;
      const lines = text.split(/[\r\n]+/).map(l => l.split(/[,;\t]/)[0].trim()).filter(l => l && (l.includes(".")||l.includes("//")));
      document.getElementById("batchUrls").value = lines.join("\n");
    };
    reader.readAsText(file);
  });
  document.getElementById("batchStart").addEventListener("click", runBatchScrape);
}
async function runBatchScrape() {
  const raw = document.getElementById("batchUrls").value.trim();
  if (!raw) return;
  const urls = raw.split(/[\r\n]+/).map(u => u.trim()).filter(u => u);
  if (!urls.length) return;
  const prog = document.getElementById("batchProgress");
  const fill = document.getElementById("batchFill");
  const log = document.getElementById("batchLog");
  const statusText = document.getElementById("batchStatusText");
  const startBtn = document.getElementById("batchStart");
  prog.style.display = "block";
  startBtn.disabled = true;
  let ok = 0, fail = 0;
  log.innerHTML = "";
  for (let i = 0; i < urls.length; i++) {
    const url = normUrl(urls[i]);
    const domain = domainOnly(url);
    statusText.textContent = `${t("batch_progress")} ${i+1}/${urls.length}... ${domain}`;
    fill.style.width = ((i+1)/urls.length*100).toFixed(1) + "%";
    try {
      const d = await api("/api/leads/scrape", { url });
      const ext = d.extracted || {};
      const konatel = nn(ext.contact_name) || nn(d.meno) || "";
      const telefon = nn(ext.phone) || nn(d.telefon) || "";
      const email = nn(ext.email) || nn(d.email) || "";
      const score = (typeof d.score === "number") ? d.score : estimateScore(konatel, telefon, email);
      const tier = d.tier || tierFromScore(score);
      const lead = hydrate({
        id: uid++, shop: domainOnly(d.primary_identifier || d.url || url), konatel,
        rola: nn(ext.contact_role) || nn(d.rola) || "", telefon, email, score, tier, status:"novy",
        ico: ext.ico || d.ico || "",
        reasoning: ext.reasoning || "",
        phone_type: ext.phone_type || "",
        phone_confidence: ext.phone_confidence || "",
        employee_count: ext.employee_count || "",
        employee_category: ext.employee_category || "",
        name_found_on_web: ext.name_found_on_web || false,
        score_breakdown: ext.score_breakdown || [],
        all_phones: ext.all_phones || [],
        other_contacts: ext.other_contacts || [],
        registry_source: ext.registry_source || "",
      });
      leads.unshift(lead);
      save(); renderSidebar(); renderTable();
      ok++;
      log.innerHTML += `<div class="ok">✓ ${esc(domain)} — ${esc(konatel||"?")} / ${esc(telefon||"—")}</div>`;
    } catch (err) {
      fail++;
      log.innerHTML += `<div class="fail">✗ ${esc(domain)} — ${err.message||"error"}</div>`;
    }
    log.scrollTop = log.scrollHeight;
  }
  statusText.textContent = `${t("batch_done")}: ${ok} ${t("batch_ok")}, ${fail} ${t("batch_fail")}`;
  startBtn.disabled = false;
  startBtn.innerHTML = `<i data-lucide="check"></i> ${esc(t("batch_done"))}`;
  icons();
}

/* ============================================================
   LANGUAGE SELECTOR
   ============================================================ */
document.getElementById("langBtn").addEventListener("click", (e)=>{
  e.stopPropagation();
  if (document.querySelector(".lang-menu")) { closeMenus(); return; }
  closeMenus();
  const r = e.currentTarget.getBoundingClientRect();
  const m = document.createElement("div");
  m.className = "menu lang-menu";
  m.style.top = (r.bottom + window.scrollY + 6) + "px";
  m.style.left = (r.left + window.scrollX - 100) + "px";
  m.innerHTML = LANGS.map(L=>`
    <button data-lang="${L.code}" class="${L.code===currentLang?"active":""}">
      <span class="flag">${L.flag}</span> ${esc(L.name)} (${L.code})
      ${L.code===currentLang?`<span class="check"><i data-lucide="check"></i></span>`:``}
    </button>`).join("");
  document.body.appendChild(m); icons();
  m.addEventListener("click", (ev)=>{ const b=ev.target.closest("[data-lang]"); if(!b) return; setLang(b.dataset.lang); closeMenus(); });
});
function setLang(code) {
  if (!I18N[code]) return;
  currentLang = code; localStorage.setItem("wector_lang", code);
  applyStaticI18n(); renderSidebar(); renderTable();
}

/* ============================================================
   THEME
   ============================================================ */
const themeBtn = document.getElementById("themeToggle");
function applyTheme(th) {
  document.documentElement.setAttribute("data-theme", th);
  themeBtn.innerHTML = th==="light" ? `<i data-lucide="sun"></i>` : `<i data-lucide="moon"></i>`;
  localStorage.setItem("wector_theme", th); icons();
}
themeBtn.addEventListener("click", ()=>{
  const cur = document.documentElement.getAttribute("data-theme")==="light" ? "light":"dark";
  applyTheme(cur==="light"?"dark":"light");
});

/* ============================================================
   INIT
   ============================================================ */
load();
applyStaticI18n();
applyTheme(localStorage.getItem("wector_theme") || "dark");
renderSidebar();
renderTable();
icons();
</script>
